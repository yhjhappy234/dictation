<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">听写小助手</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --accent-color: #FFE66D;
            --bg-color: #FFF5F5;
            --text-color: #2C3E50;
            --success-color: #95E1D3;
            --warning-color: #F38181;
        }

        * {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-color) 0%, #FFF 100%);
            min-height: 100vh;
            color: var(--text-color);
        }

        .navbar {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .navbar-brand {
            font-size: 1.8rem;
            font-weight: bold;
            color: white !important;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .nav-link {
            color: white !important;
            font-size: 1.2rem;
            padding: 0.5rem 1.5rem !important;
            margin: 0 0.5rem;
            border-radius: 25px;
            transition: all 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            background-color: rgba(255,255,255,0.3);
            transform: scale(1.05);
        }

        .main-container {
            padding: 2rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(255,107,107,0.5);
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--secondary-color), var(--success-color));
            border: none;
            border-radius: 25px;
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            box-shadow: 0 4px 15px rgba(78,205,196,0.4);
        }

        .btn-secondary:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(78,205,196,0.5);
        }

        .card {
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .card-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 20px 20px 0 0 !important;
            font-size: 1.3rem;
            font-weight: bold;
        }

        .form-control, .form-select {
            border-radius: 15px;
            padding: 12px 20px;
            font-size: 1.1rem;
            border: 2px solid #E0E0E0;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.2rem rgba(78,205,196,0.25);
        }

        .stat-card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .stat-card-sm {
            background: white;
            border-radius: 10px;
            padding: 6px 10px;
            text-align: center;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
        }

        .stat-number {
            font-size: 3rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stat-number-sm {
            font-size: 1.2rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.1;
        }

        .stat-label {
            font-size: 1.1rem;
            color: #888;
            margin-top: 10px;
        }

        .stat-label-sm {
            font-size: 0.7rem;
            color: #888;
            margin-top: 1px;
        }

        .word-display {
            font-size: 4rem;
            font-weight: bold;
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin: 20px 0;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
        }

        .btn-action {
            padding: 15px 35px;
            font-size: 1.3rem;
            border-radius: 30px;
            font-weight: bold;
            margin: 5px;
            transition: all 0.3s ease;
        }

        .btn-action:hover {
            transform: scale(1.05);
        }

        .progress {
            height: 20px;
            border-radius: 10px;
            background-color: #E0E0E0;
        }

        .progress-bar {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color));
            border-radius: 10px;
        }

        .table {
            border-radius: 15px;
            overflow: hidden;
        }

        .table thead {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .table th {
            font-size: 1.1rem;
            padding: 15px;
        }

        .table td {
            padding: 15px;
            font-size: 1.1rem;
            vertical-align: middle;
        }

        .star-rating {
            color: var(--accent-color);
            font-size: 1.5rem;
        }

        .modal-content {
            border-radius: 20px;
            border: none;
        }

        .modal-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            border-radius: 20px 20px 0 0;
        }

        .modal-header .btn-close {
            filter: brightness(0) invert(1);
        }

        .tab-content {
            padding: 20px;
            background: white;
            border-radius: 0 0 20px 20px;
        }

        .nav-tabs {
            border: none;
        }

        .nav-tabs .nav-link {
            background: #E0E0E0;
            border: none;
            border-radius: 15px 15px 0 0;
            color: var(--text-color);
            font-size: 1.1rem;
            font-weight: bold;
            margin-right: 5px;
        }

        .nav-tabs .nav-link.active {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
        }

        .filter-section {
            background: white;
            padding: 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        .history-card {
            cursor: pointer;
            border-left: 5px solid var(--primary-color);
        }

        .badge-status {
            font-size: 1rem;
            padding: 8px 15px;
            border-radius: 20px;
        }

        .chart-container {
            background: white;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
        }

        @media (max-width: 768px) {
            .word-display {
                font-size: 2.5rem;
                padding: 20px;
            }

            .stat-number {
                font-size: 2rem;
            }

            .btn-action {
                padding: 12px 25px;
                font-size: 1.1rem;
            }

            .nav-link {
                font-size: 1rem;
                padding: 0.3rem 0.8rem !important;
            }
        }
    </style>
</head>

<!-- 导航栏fragment -->
<nav th:fragment="navbar(activePage)" class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">
            <i class="bi bi-book-half me-2"></i>听写小助手
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'index'} ? 'active'" href="/">
                        <i class="bi bi-house-door me-1"></i>首页
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'tasks'} ? 'active'" href="/tasks">
                        <i class="bi bi-list-check me-1"></i>任务管理
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'history'} ? 'active'" href="/history">
                        <i class="bi bi-clock-history me-1"></i>历史记录
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'difficult'} ? 'active'" href="/difficult-words">
                        <i class="bi bi-star me-1"></i>生词本
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'dictators'} ? 'active'" href="/dictators">
                        <i class="bi bi-people me-1"></i>听写人
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:classappend="${activePage == 'reports'} ? 'active'" href="/reports">
                        <i class="bi bi-graph-up me-1"></i>报表
                    </a>
                </li>
                <!-- 用户管理（管理员可见） -->
                <li class="nav-item" id="userManagementNavItem" style="display: none;">
                    <a class="nav-link" th:classappend="${activePage == 'user-management'} ? 'active'" href="/user-management">
                        <i class="bi bi-person-badge me-1"></i>用户管理
                    </a>
                </li>
                <!-- 审计日志（管理员可见） -->
                <li class="nav-item" id="auditLogsNavItem" style="display: none;">
                    <a class="nav-link" th:classappend="${activePage == 'audit-logs'} ? 'active'" href="/audit-logs">
                        <i class="bi bi-journal-text me-1"></i>审计日志
                    </a>
                </li>
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                        <img id="userAvatar" src="/images/avatars/avatar1.png" class="rounded-circle me-2" width="32" height="32" alt="头像">
                        <span id="currentUsername">用户</span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li>
                            <a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#avatarModal">
                                <i class="bi bi-image me-1"></i>更换头像
                            </a>
                        </li>
                        <li>
                            <a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#passwordModal">
                                <i class="bi bi-key me-1"></i>修改密码
                            </a>
                        </li>
                        <li><hr class="dropdown-divider"></li>
                        <li><a class="dropdown-item text-danger" href="#" onclick="logout()"><i class="bi bi-box-arrow-right me-1"></i>退出登录</a></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- 更换头像模态框 -->
<div class="modal fade" id="avatarModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-image me-2"></i>更换头像</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row" id="avatarGrid">
                    <!-- 头像列表将通过JS动态生成 -->
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 修改密码模态框 -->
<div class="modal fade" id="passwordModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-key me-2"></i>修改密码</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="passwordForm">
                    <div class="mb-3">
                        <label class="form-label">新密码</label>
                        <input type="password" class="form-control" id="newPassword" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">确认密码</label>
                        <input type="password" class="form-control" id="confirmPassword" required minlength="6">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="changePassword()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 页脚fragment -->
<footer th:fragment="footer" class="text-center py-4 mt-5">
    <p class="text-muted mb-0">
        <small>听写小助手 - 让学习更有趣</small>
    </p>
</footer>

<!-- 脚本fragment -->
<div th:fragment="scripts">
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 获取当前用户信息
        async function loadCurrentUser() {
            try {
                const response = await fetch('/api/v1/auth/current', { credentials: 'include' });
                const result = await response.json();
                if (result.success && result.data) {
                    document.getElementById('currentUsername').textContent = result.data.username;
                    // 设置头像
                    if (result.data.avatar) {
                        document.getElementById('userAvatar').src = '/images/avatars/' + result.data.avatar;
                    }
                    // 显示用户管理菜单（管理员）
                    if (result.data.role === 'ADMIN') {
                        document.getElementById('userManagementNavItem').style.display = 'block';
                        document.getElementById('auditLogsNavItem').style.display = 'block';
                    }
                }
            } catch (error) {
                console.error('获取用户信息失败:', error);
            }
        }

        // 加载头像列表
        async function loadAvatars() {
            try {
                const response = await fetch('/api/v1/auth/avatars', { credentials: 'include' });
                const result = await response.json();
                if (result.success && result.data) {
                    const grid = document.getElementById('avatarGrid');
                    grid.innerHTML = '';
                    result.data.forEach(avatar => {
                        const col = document.createElement('div');
                        col.className = 'col-3 mb-3';
                        col.innerHTML = `
                            <img src="/images/avatars/${avatar}"
                                 class="img-thumbnail avatar-option"
                                 width="80" height="80"
                                 onclick="selectAvatar('${avatar}')"
                                 style="cursor: pointer;">
                        `;
                        grid.appendChild(col);
                    });
                }
            } catch (error) {
                console.error('加载头像列表失败:', error);
            }
        }

        // 选择头像
        async function selectAvatar(avatar) {
            try {
                const response = await fetch('/api/v1/users/me/avatar?avatar=' + avatar, {
                    method: 'POST',
                    credentials: 'include'
                });
                const result = await response.json();
                if (result.success) {
                    document.getElementById('userAvatar').src = '/images/avatars/' + avatar;
                    bootstrap.Modal.getInstance(document.getElementById('avatarModal')).hide();
                    showToast('头像修改成功', 'success');
                } else {
                    showToast(result.message || '修改失败', 'warning');
                }
            } catch (error) {
                console.error('修改头像失败:', error);
                showToast('修改失败', 'warning');
            }
        }

        // 修改密码
        async function changePassword() {
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (!newPassword || newPassword.length < 6) {
                showToast('密码长度至少6位', 'warning');
                return;
            }

            if (newPassword !== confirmPassword) {
                showToast('两次密码不一致', 'warning');
                return;
            }

            try {
                const response = await fetch('/api/v1/users/me/password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    credentials: 'include',
                    body: JSON.stringify({ newPassword: newPassword })
                });
                const result = await response.json();
                if (result.success) {
                    bootstrap.Modal.getInstance(document.getElementById('passwordModal')).hide();
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                    showToast('密码修改成功', 'success');
                } else {
                    showToast(result.message || '修改失败', 'warning');
                }
            } catch (error) {
                console.error('修改密码失败:', error);
                showToast('修改失败', 'warning');
            }
        }

        // 登出
        async function logout() {
            try {
                const response = await fetch('/api/v1/auth/logout', {
                    method: 'POST',
                    credentials: 'include'
                });
                const result = await response.json();
                if (result.success) {
                    window.location.href = '/login';
                }
            } catch (error) {
                console.error('登出失败:', error);
                window.location.href = '/login';
            }
        }

        // 显示提示
        function showToast(message, type = 'info') {
            const toastHtml = `
                <div class="toast align-items-center text-white bg-${type === 'warning' ? 'warning' : 'primary'} border-0" role="alert">
                    <div class="d-flex">
                        <div class="toast-body">${message}</div>
                        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                    </div>
                </div>
            `;
            const container = document.createElement('div');
            container.className = 'toast-container position-fixed top-0 end-0 p-3';
            container.innerHTML = toastHtml;
            document.body.appendChild(container);
            const toast = new bootstrap.Toast(container.querySelector('.toast'));
            toast.show();
            setTimeout(() => container.remove(), 5000);
        }

        // 页面加载时
        document.addEventListener('DOMContentLoaded', async function() {
            await loadCurrentUser();
            await loadAvatars();
        });
    </script>
</div>
</html>
