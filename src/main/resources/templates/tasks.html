<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{layout :: head('听写小助手 - 任务管理')}"></head>
<body>
<!-- 导航栏 -->
<nav th:replace="~{layout :: navbar('tasks')}"></nav>

<div class="main-container">
    <!-- 创建听写任务按钮 -->
    <div class="row mb-3">
        <div class="col-12">
            <button class="btn btn-success btn-action" onclick="toggleCreatePanel()">
                <i class="bi bi-plus-circle me-2"></i>创建听写任务
            </button>
        </div>
    </div>

    <!-- 创建听写任务面板（默认隐藏） -->
    <div class="row mb-4" id="createTaskPanel" style="display: none;">
        <div class="col-12">
            <div class="card">
                <div class="card-header bg-success text-white">
                    <i class="bi bi-plus-circle me-2"></i>创建新听写任务
                </div>
                <div class="card-body">
                    <!-- 快速导入预设内容 -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">预设内容：</label>

                        <!-- 第一级：分类选择 -->
                        <div class="d-flex flex-wrap gap-2 mb-3">
                            <button class="btn btn-outline-primary btn-sm category-btn" onclick="showGradeList()">
                                <i class="bi bi-book me-1"></i>小学语文教科书
                            </button>
                            <button class="btn btn-outline-success btn-sm" onclick="importPreset('common-words-50')">
                                <i class="bi bi-book me-1"></i>50个常用词
                            </button>
                            <button class="btn btn-outline-info btn-sm" onclick="importPreset('common-idioms-50')">
                                <i class="bi bi-chat-quote me-1"></i>50个成语
                            </button>
                            <button class="btn btn-outline-warning btn-sm" onclick="importPreset('common-poems-20')">
                                <i class="bi bi-feather me-1"></i>20首古诗
                            </button>
                            <button class="btn btn-outline-secondary btn-sm" onclick="importPreset('classics-5')">
                                <i class="bi bi-scroll me-1"></i>5篇古文
                            </button>
                        </div>

                        <!-- 第二级：年级选择（默认隐藏） -->
                        <div id="gradeListContainer" class="mb-3" style="display: none;">
                            <label class="form-label text-muted small">选择年级：</label>
                            <div class="d-flex flex-wrap gap-2" id="gradeList">
                                <!-- 动态填充 -->
                            </div>
                        </div>

                        <!-- 第三级：单元选择（默认隐藏） -->
                        <div id="unitListContainer" class="mb-3" style="display: none;">
                            <label class="form-label text-muted small">选择单元：</label>
                            <div class="d-flex flex-wrap gap-2" id="unitList">
                                <!-- 动态填充 -->
                            </div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="createTaskName" class="form-label fw-bold">任务名称 <span class="text-danger">*</span>：</label>
                        <input type="text" class="form-control" id="createTaskName" placeholder="例如：第一单元听写">
                    </div>
                    <div class="mb-3">
                        <label for="createTaskWords" class="form-label fw-bold">词语（每行一个）：</label>
                        <textarea class="form-control" id="createTaskWords" rows="6" placeholder="示例：&#10;苹果&#10;香蕉&#10;橙子&#10;西瓜"></textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button class="btn btn-success btn-action" onclick="createTask()">
                            <i class="bi bi-save me-2"></i>保存任务
                        </button>
                        <button class="btn btn-secondary btn-action" onclick="clearCreateForm()">
                            <i class="bi bi-trash me-2"></i>清空
                        </button>
                        <button class="btn btn-outline-secondary btn-action" onclick="toggleCreatePanel()">
                            <i class="bi bi-x-circle me-2"></i>关闭
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="row mb-4">
        <div class="col-12">
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-list-check me-2"></i>任务管理
                </div>
                <div class="card-body">
                    <!-- 状态筛选 -->
                    <div class="mb-3">
                        <div class="btn-group" role="group">
                            <button type="button" class="btn btn-outline-primary active" onclick="filterTasks('all')">
                                <i class="bi bi-list me-1"></i>全部
                            </button>
                            <button type="button" class="btn btn-outline-secondary" onclick="filterTasks('NOT_STARTED')">
                                <i class="bi bi-circle me-1"></i>未开始
                            </button>
                            <button type="button" class="btn btn-outline-info" onclick="filterTasks('IN_PROGRESS')">
                                <i class="bi bi-play-circle me-1"></i>进行中
                            </button>
                            <button type="button" class="btn btn-outline-success" onclick="filterTasks('COMPLETED')">
                                <i class="bi bi-check-circle me-1"></i>已完成
                            </button>
                        </div>
                    </div>

                    <!-- 任务列表 -->
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>任务名称</th>
                                    <th>词语数量</th>
                                    <th>正确/错误</th>
                                    <th>正确率</th>
                                    <th>状态</th>
                                    <th>创建时间</th>
                                    <th>收藏</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="taskList">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑任务模态框 -->
    <div class="modal fade" id="editTaskModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>编辑任务</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editTaskId">
                    <div class="mb-3">
                        <label class="form-label fw-bold">任务名称：</label>
                        <input type="text" class="form-control" id="editTaskName">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">词语（每行一个）：</label>
                        <textarea class="form-control" id="editTaskWords" rows="8"></textarea>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">状态：</label>
                        <select class="form-select" id="editTaskStatus">
                            <option value="NOT_STARTED">未开始</option>
                            <option value="IN_PROGRESS">进行中</option>
                            <option value="COMPLETED">已完成</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveEditedTask()">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 查看任务词语模态框 -->
    <div class="modal fade" id="viewWordsModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="bi bi-eye me-2"></i>查看任务词语</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <h6 id="viewTaskName" class="mb-3"></h6>
                    <div class="d-flex flex-wrap gap-2" id="viewWordsList">
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<footer th:replace="~{layout :: footer}"></footer>

<!-- 脚本 -->
<div th:replace="~{layout :: scripts}"></div>

<script>
    let currentFilter = 'all';

    // 年级配置
    const gradeConfig = {
        'grade1-up': { name: '一年级上册', hasUnits: true },
        'grade1-down': { name: '一年级下册', hasUnits: true },
        'grade2-up': { name: '二年级上册', hasUnits: true },
        'grade2-down': { name: '二年级下册', hasSeparateUnits: true, unitFiles: ['grade2-unit1', 'grade2-unit2', 'grade2-unit3', 'grade2-unit4', 'grade2-unit5', 'grade2-unit6', 'grade2-unit7', 'grade2-unit8'] },
        'grade3-up': { name: '三年级上册', hasUnits: true },
        'grade3-down': { name: '三年级下册', hasUnits: true },
        'grade4-up': { name: '四年级上册', hasUnits: true },
        'grade4-down': { name: '四年级下册', hasUnits: true },
        'grade5-up': { name: '五年级上册', hasUnits: true },
        'grade5-down': { name: '五年级下册', hasUnits: true }
    };

    // 缓存年级数据
    let gradeDataCache = {};

    // 页面加载完成
    document.addEventListener('DOMContentLoaded', function() {
        loadTasks();
    });

    // 加载任务列表
    async function loadTasks() {
        try {
            let url = '/api/v1/tasks';
            if (currentFilter !== 'all') {
                url = `/api/tasks/status/${currentFilter}`;
            }

            const response = await fetch(url);
            const result = await response.json();

            if (result.success && result.data) {
                renderTaskList(result.data);
            }
        } catch (error) {
            console.error('加载任务失败:', error);
        }
    }

    // 渲染任务列表
    function renderTaskList(tasks) {
        const tbody = document.getElementById('taskList');
        tbody.innerHTML = '';

        if (tasks.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center text-muted">暂无任务</td></tr>';
            return;
        }

        tasks.forEach(task => {
            const statusBadge = getStatusBadge(task.status);
            const favoriteIcon = task.isFavorite ? 'bi-star-fill text-warning' : 'bi-star text-muted';
            const favoriteBtn = task.isFavorite ? '取消收藏' : '添加收藏';

            // 计算正确率
            const accuracy = task.wordCount > 0 ? Math.round((task.correctCount / task.wordCount) * 100) : 0;
            const correctWrongDisplay = task.status === 'COMPLETED'
                ? `<span class="text-success">${task.correctCount || 0}</span>/<span class="text-danger">${task.wrongCount || 0}</span>`
                : '-';

            // 正确率显示（只有已完成任务才显示）
            const accuracyDisplay = task.status === 'COMPLETED'
                ? `<div class="progress" style="height: 20px; width: 80px;">
                       <div class="progress-bar ${accuracy >= 80 ? 'bg-success' : accuracy >= 60 ? 'bg-warning' : 'bg-danger'}"
                            style="width: ${accuracy}%">${accuracy}%</div>
                   </div>`
                : '-';

            tbody.innerHTML += `
                <tr>
                    <td><strong>${task.taskName}</strong></td>
                    <td>${task.wordCount}个词</td>
                    <td>${correctWrongDisplay}</td>
                    <td>${accuracyDisplay}</td>
                    <td>${statusBadge}</td>
                    <td>${formatDate(task.createdAt)}</td>
                    <td>
                        <i class="bi ${favoriteIcon}"></i>
                    </td>
                    <td>
                        <div class="btn-group btn-group-sm">
                            <button class="btn btn-outline-info" onclick="viewWords(${task.id})" title="查看词语">
                                <i class="bi bi-eye"></i>
                            </button>
                            <button class="btn btn-outline-primary" onclick="editTask(${task.id})" title="编辑">
                                <i class="bi bi-pencil"></i>
                            </button>
                            <button class="btn btn-outline-warning" onclick="toggleFavorite(${task.id}, ${!task.isFavorite})" title="${favoriteBtn}">
                                <i class="bi bi-star"></i>
                            </button>
                            <button class="btn btn-outline-danger" onclick="deleteTask(${task.id})" title="删除">
                                <i class="bi bi-trash"></i>
                            </button>
                        </div>
                        <div class="btn-group btn-group-sm ms-1">
                            ${task.status === 'NOT_STARTED' ? `<button class="btn btn-outline-success" onclick="changeStatus(${task.id}, 'IN_PROGRESS')" title="开始"><i class="bi bi-play-circle"></i></button>` : ''}
                            ${task.status === 'IN_PROGRESS' ? `<button class="btn btn-outline-success" onclick="changeStatus(${task.id}, 'COMPLETED')" title="完成"><i class="bi bi-check-circle"></i></button>` : ''}
                            ${task.status !== 'NOT_STARTED' ? `<button class="btn btn-outline-secondary" onclick="changeStatus(${task.id}, 'NOT_STARTED')" title="重置"><i class="bi bi-arrow-counterclockwise"></i></button>` : ''}
                        </div>
                    </td>
                </tr>
            `;
        });
    }

    // 获取状态徽章
    function getStatusBadge(status) {
        switch (status) {
            case 'NOT_STARTED':
                return '<span class="badge bg-secondary badge-status">未开始</span>';
            case 'IN_PROGRESS':
                return '<span class="badge bg-info badge-status">进行中</span>';
            case 'COMPLETED':
                return '<span class="badge bg-success badge-status">已完成</span>';
            default:
                return '<span class="badge bg-secondary badge-status">' + status + '</span>';
        }
    }

    // 格式化日期
    function formatDate(dateStr) {
        if (!dateStr) return '-';
        const date = new Date(dateStr);
        return date.toLocaleDateString('zh-CN');
    }

    // 状态筛选
    function filterTasks(status) {
        currentFilter = status;

        // 更新按钮状态
        document.querySelectorAll('.btn-group .btn').forEach(btn => {
            btn.classList.remove('active');
        });
        event.target.classList.add('active');

        loadTasks();
    }

    // 查看词语
    async function viewWords(taskId) {
        try {
            const response = await fetch(`/api/tasks/${taskId}`);
            const result = await response.json();

            if (result.success && result.data) {
                const task = result.data;
                document.getElementById('viewTaskName').textContent = task.taskName;

                const wordsContainer = document.getElementById('viewWordsList');
                wordsContainer.innerHTML = '';

                task.words.forEach(word => {
                    wordsContainer.innerHTML += `<span class="badge bg-light text-dark fs-6 px-3 py-2">${word}</span>`;
                });

                const modal = new bootstrap.Modal(document.getElementById('viewWordsModal'));
                modal.show();
            }
        } catch (error) {
            console.error('获取任务详情失败:', error);
        }
    }

    // 编辑任务
    async function editTask(taskId) {
        try {
            const response = await fetch(`/api/tasks/${taskId}`);
            const result = await response.json();

            if (result.success && result.data) {
                const task = result.data;
                document.getElementById('editTaskId').value = task.id;
                document.getElementById('editTaskName').value = task.taskName;
                document.getElementById('editTaskWords').value = task.words.join('\n');
                document.getElementById('editTaskStatus').value = task.status;

                const modal = new bootstrap.Modal(document.getElementById('editTaskModal'));
                modal.show();
            }
        } catch (error) {
            console.error('获取任务详情失败:', error);
        }
    }

    // 保存编辑的任务
    async function saveEditedTask() {
        const taskId = document.getElementById('editTaskId').value;
        const taskName = document.getElementById('editTaskName').value.trim();
        const words = document.getElementById('editTaskWords').value.trim();
        const status = document.getElementById('editTaskStatus').value;

        if (!taskName) {
            showToast('任务名称不能为空', 'warning');
            return;
        }

        if (!words) {
            showToast('词语不能为空', 'warning');
            return;
        }

        try {
            // 更新任务内容
            const updateResponse = await fetch(`/api/tasks/${taskId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    taskName: taskName,
                    words: words
                })
            });

            const updateResult = await updateResponse.json();

            if (updateResult.success) {
                // 更新状态
                await fetch(`/api/tasks/${taskId}/status?status=${status}`, {
                    method: 'PUT'
                });

                showToast('任务已更新', 'success');

                bootstrap.Modal.getInstance(document.getElementById('editTaskModal')).hide();
                loadTasks();
            } else {
                showToast(updateResult.message || '更新失败', 'warning');
            }
        } catch (error) {
            console.error('更新任务失败:', error);
            showToast('更新失败', 'warning');
        }
    }

    // 更改状态
    async function changeStatus(taskId, status) {
        try {
            const response = await fetch(`/api/tasks/${taskId}/status?status=${status}`, {
                method: 'PUT'
            });

            const result = await response.json();

            if (result.success) {
                showToast('状态已更新', 'success');
                loadTasks();
            } else {
                showToast(result.message || '更新失败', 'warning');
            }
        } catch (error) {
            console.error('更新状态失败:', error);
            showToast('更新失败', 'warning');
        }
    }

    // 切换收藏
    async function toggleFavorite(taskId, isFavorite) {
        try {
            const response = await fetch(`/api/tasks/${taskId}/favorite?isFavorite=${isFavorite}`, {
                method: 'POST'
            });

            const result = await response.json();

            if (result.success) {
                showToast(isFavorite ? '已添加收藏' : '已取消收藏', 'success');
                loadTasks();
            } else {
                showToast(result.message || '操作失败', 'warning');
            }
        } catch (error) {
            console.error('切换收藏失败:', error);
            showToast('操作失败', 'warning');
        }
    }

    // 删除任务
    async function deleteTask(taskId) {
        if (!confirm('确定要删除这个任务吗？')) {
            return;
        }

        try {
            const response = await fetch(`/api/tasks/${taskId}`, {
                method: 'DELETE'
            });

            const result = await response.json();

            if (result.success) {
                showToast('任务已删除', 'success');
                loadTasks();
            } else {
                showToast(result.message || '删除失败', 'warning');
            }
        } catch (error) {
            console.error('删除任务失败:', error);
            showToast('删除失败', 'warning');
        }
    }

    // 显示/隐藏创建任务面板
    function toggleCreatePanel() {
        const panel = document.getElementById('createTaskPanel');
        if (panel.style.display === 'none') {
            panel.style.display = 'block';
        } else {
            panel.style.display = 'none';
        }
    }

    // 创建新任务
    async function createTask() {
        const taskName = document.getElementById('createTaskName').value.trim();
        const words = document.getElementById('createTaskWords').value.trim();

        if (!taskName) {
            showToast('请输入任务名称', 'warning');
            return;
        }

        if (!words) {
            showToast('请输入词语', 'warning');
            return;
        }

        try {
            const response = await fetch('/api/v1/tasks', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    taskName: taskName,
                    words: words
                })
            });

            const result = await response.json();

            if (result.success) {
                showToast('任务创建成功', 'success');
                clearCreateForm();
                loadTasks();
            } else {
                showToast(result.message || '创建失败', 'warning');
            }
        } catch (error) {
            console.error('创建任务失败:', error);
            showToast('创建失败', 'warning');
        }
    }

    // 清空创建表单
    function clearCreateForm() {
        document.getElementById('createTaskName').value = '';
        document.getElementById('createTaskWords').value = '';
    }

    // 显示年级列表
    async function showGradeList() {
        // 先打开创建任务面板
        const panel = document.getElementById('createTaskPanel');
        if (panel.style.display === 'none') {
            panel.style.display = 'block';
        }

        // 显示年级列表容器，隐藏单元列表
        document.getElementById('gradeListContainer').style.display = 'block';
        document.getElementById('unitListContainer').style.display = 'none';

        const gradeListDiv = document.getElementById('gradeList');
        gradeListDiv.innerHTML = '';

        // 添加年级按钮
        for (const [gradeId, config] of Object.entries(gradeConfig)) {
            gradeListDiv.innerHTML += `
                <button class="btn btn-outline-primary btn-sm grade-btn" onclick="selectGrade('${gradeId}')">
                    <i class="bi bi-book me-1"></i>${config.name}
                </button>
            `;
        }
    }

    // 选择年级，显示单元列表
    async function selectGrade(gradeId) {
        const config = gradeConfig[gradeId];

        // 更新按钮状态
        document.querySelectorAll('.grade-btn').forEach(btn => btn.classList.remove('active'));
        event.target.classList.add('active');

        // 显示单元列表容器
        document.getElementById('unitListContainer').style.display = 'block';

        const unitListDiv = document.getElementById('unitList');
        unitListDiv.innerHTML = '<span class="text-muted">加载中...</span>';

        try {
            // 二年级下册使用单独的单元文件
            if (config.hasSeparateUnits) {
                unitListDiv.innerHTML = '';
                config.unitFiles.forEach((unitId, index) => {
                    unitListDiv.innerHTML += `
                        <button class="btn btn-outline-success btn-sm" onclick="loadUnitWords('${unitId}')">
                            <i class="bi bi-journal-text me-1"></i>第${index + 1}单元
                        </button>
                    `;
                });
                return;
            }

            // 其他年级需要加载完整文件获取单元
            const response = await fetch(`/api/preset/${gradeId}`);
            const result = await response.json();

            if (result.success && result.data && result.data.units) {
                // 缓存数据
                gradeDataCache[gradeId] = result.data;

                unitListDiv.innerHTML = '';
                result.data.units.forEach(unit => {
                    // 收集单元所有词语
                    let allWords = [];
                    if (unit.lessons) {
                        unit.lessons.forEach(lesson => {
                            if (lesson.words) {
                                allWords = allWords.concat(lesson.words);
                            }
                        });
                    }

                    unitListDiv.innerHTML += `
                        <button class="btn btn-outline-success btn-sm" onclick="fillWordsFromUnit('${gradeId}', '${unit.name}')">
                            <i class="bi bi-journal-text me-1"></i>${unit.name}
                        </button>
                    `;
                });
            } else {
                unitListDiv.innerHTML = '<span class="text-danger">加载失败，请重试</span>';
            }
        } catch (error) {
            console.error('加载年级数据失败:', error);
            unitListDiv.innerHTML = '<span class="text-danger">加载失败，请检查网络</span>';
        }
    }

    // 从单元填充词语
    function fillWordsFromUnit(gradeId, unitName) {
        const gradeData = gradeDataCache[gradeId];
        if (!gradeData || !gradeData.units) {
            showToast('数据未加载，请重新选择年级', 'warning');
            return;
        }

        // 找到对应的单元
        const unit = gradeData.units.find(u => u.name === unitName);
        if (!unit || !unit.lessons) {
            showToast('单元数据不存在', 'warning');
            return;
        }

        // 收集所有词语
        let allWords = [];
        unit.lessons.forEach(lesson => {
            if (lesson.words) {
                allWords = allWords.concat(lesson.words);
            }
        });

        // 填充到输入框
        if (allWords.length > 0) {
            document.getElementById('createTaskWords').value = allWords.join('\n');
            document.getElementById('createTaskName').value = `${gradeData.grade || gradeConfig[gradeId].name} - ${unitName}`;
            showToast(`已填充 ${allWords.length} 个词语，请点击"保存任务"完成创建`, 'success');
        } else {
            showToast('该单元没有词语', 'warning');
        }
    }

    // 加载单独单元文件的词语（二年级下册）
    async function loadUnitWords(unitId) {
        try {
            const response = await fetch(`/api/preset/${unitId}`);
            const result = await response.json();

            if (result.success && result.data) {
                const data = result.data;
                let allWords = [];

                // 收集词语
                if (data.words && Array.isArray(data.words)) {
                    allWords = data.words;
                } else if (data.lessons) {
                    data.lessons.forEach(lesson => {
                        if (lesson.words) {
                            allWords = allWords.concat(lesson.words);
                        }
                    });
                }

                // 填充到输入框
                if (allWords.length > 0) {
                    document.getElementById('createTaskWords').value = allWords.join('\n');
                    document.getElementById('createTaskName').value = data.name || unitId;
                    showToast(`已填充 ${allWords.length} 个词语，请点击"保存任务"完成创建`, 'success');
                } else {
                    showToast('没有词语数据', 'warning');
                }
            } else {
                showToast('加载失败，请重试', 'warning');
            }
        } catch (error) {
            console.error('加载单元数据失败:', error);
            showToast('加载失败，请检查网络', 'warning');
        }
    }

    // 导入预设内容
    async function importPreset(presetId) {
        try {
            // 先打开创建任务面板
            const panel = document.getElementById('createTaskPanel');
            if (panel.style.display === 'none') {
                panel.style.display = 'block';
            }

            // 隐藏年级和单元选择（如果显示的话）
            document.getElementById('gradeListContainer').style.display = 'none';
            document.getElementById('unitListContainer').style.display = 'none';

            const response = await fetch(`/api/preset/${presetId}`);

            if (!response.ok) {
                showToast('获取预设内容失败，请重试', 'warning');
                return;
            }

            const result = await response.json();

            if (result.success && result.data) {
                const data = result.data;

                // 收集词语
                let allWords = [];

                // 处理不同格式
                if (data.words && Array.isArray(data.words)) {
                    // 简单词语列表格式
                    allWords = data.words;
                } else if (data.items && Array.isArray(data.items)) {
                    // 古诗/古文格式
                    data.items.forEach(item => {
                        if (item.content) {
                            const parts = item.content.split(/[，。！？、；：]/);
                            parts.forEach(part => {
                                if (part.trim()) {
                                    allWords.push(part.trim());
                                }
                            });
                        }
                    });
                } else if (data.units && Array.isArray(data.units)) {
                    // 年级格式（有单元）
                    data.units.forEach(unit => {
                        if (unit.lessons) {
                            unit.lessons.forEach(lesson => {
                                if (lesson.words) {
                                    allWords = allWords.concat(lesson.words);
                                }
                            });
                        }
                    });
                }

                // 填充到输入框
                if (allWords.length > 0) {
                    document.getElementById('createTaskWords').value = allWords.join('\n');
                    document.getElementById('createTaskName').value = data.name || presetId;
                    showToast(`已填充 ${allWords.length} 个词语，请点击"保存任务"完成创建`, 'success');
                } else {
                    showToast('预设内容中没有词语', 'warning');
                }
            } else {
                showToast(result.message || '获取预设内容失败', 'warning');
            }
        } catch (error) {
            console.error('获取预设内容失败:', error);
            showToast('获取失败，请检查网络连接', 'warning');
        }
    }

    // 显示提示
    function showToast(message, type = 'info') {
        const toastHtml = `
            <div class="toast align-items-center text-white bg-${type === 'warning' ? 'warning' : 'primary'} border-0" role="alert">
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
        `;
        const container = document.createElement('div');
        container.className = 'toast-container position-fixed top-0 end-0 p-3';
        container.innerHTML = toastHtml;
        document.body.appendChild(container);
        const toast = new bootstrap.Toast(container.querySelector('.toast'));
        toast.show();
        setTimeout(() => container.remove(), 5000);
    }
</script>
