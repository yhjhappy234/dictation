<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{layout :: head('听写小助手 - 历史记录')}"></head>
<body>
<!-- 导航栏 -->
<nav th:replace="~{layout :: navbar('history')}"></nav>

<div class="main-container">
    <h2 class="mb-4">
        <i class="bi bi-clock-history me-2"></i>听写历史记录
    </h2>

    <!-- 统计概览 -->
    <div class="row mb-4">
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">已完成任务数</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number text-success" id="totalCorrect">0</div>
                <div class="stat-label">总正确数</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card">
                <div class="stat-number text-danger" id="totalWrong">0</div>
                <div class="stat-label">总错误数</div>
            </div>
        </div>
    </div>

    <!-- 任务列表 -->
    <div class="card">
        <div class="card-header">
            <i class="bi bi-list-ul me-2"></i>已完成任务列表
        </div>
        <div class="card-body">
            <div class="row" id="taskHistoryList">
                <!-- 任务卡片将通过JavaScript动态加载 -->
            </div>
        </div>
    </div>
</div>

<!-- 详情弹窗 -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-list-check me-2"></i>任务详情
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="stat-card">
                            <h6 class="text-muted">任务名称</h6>
                            <h4 id="modalTaskName">-</h4>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card">
                            <h6 class="text-muted">听写人</h6>
                            <h4 id="modalDictator">-</h4>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card">
                            <h6 class="text-muted">听写时间</h6>
                            <h4 id="modalDate">-</h4>
                        </div>
                    </div>
                </div>
                <div class="row mb-4">
                    <div class="col-md-4">
                        <div class="stat-card">
                            <div class="stat-number" id="modalWordCount">0</div>
                            <div class="stat-label">词语总数</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card">
                            <div class="stat-number text-success" id="modalCorrect">0</div>
                            <div class="stat-label">正确数</div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="stat-card">
                            <div class="stat-number text-danger" id="modalWrong">0</div>
                            <div class="stat-label">错误数</div>
                        </div>
                    </div>
                </div>
                <!-- 正确率进度条 -->
                <div class="mb-4">
                    <h6 class="fw-bold">正确率</h6>
                    <div class="progress" style="height: 25px;">
                        <div class="progress-bar bg-success" id="modalProgress" style="width: 0%">0%</div>
                    </div>
                </div>
                <!-- 词语列表 -->
                <h6 class="fw-bold">词语详情</h6>
                <div class="table-responsive">
                    <table class="table table-hover">
                        <thead>
                            <tr>
                                <th>词语</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="modalWordList">
                        </tbody>
                    </table>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button type="type" class="btn btn-primary" onclick="replayTask()">
                    <i class="bi bi-arrow-repeat me-2"></i>重新听写
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<footer th:replace="~{layout :: footer}"></footer>

<!-- 脚本 -->
<div th:replace="~{layout :: scripts}"></div>

<script>
    // 全局变量
    let currentTaskId = null;

    // 页面加载
    document.addEventListener('DOMContentLoaded', function() {
        loadTaskHistory();
    });

    // 加载任务历史
    async function loadTaskHistory() {
        try {
            const response = await fetch('/api/tasks/status/COMPLETED');
            const result = await response.json();

            if (result.success && result.data) {
                renderTaskHistoryList(result.data);
            }
        } catch (error) {
            console.error('加载任务历史失败:', error);
        }
    }

    // 渲染任务历史列表
    function renderTaskHistoryList(tasks) {
        const container = document.getElementById('taskHistoryList');
        container.innerHTML = '';

        if (tasks.length === 0) {
            container.innerHTML = '<div class="col-12 text-center py-5"><i class="bi bi-inbox" style="font-size: 4rem; color: #ccc;"></i><p class="mt-3 text-muted fs-5">暂无听写记录</p></div>';
            return;
        }

        // 统计总数
        let totalCorrect = 0;
        let totalWrong = 0;

        tasks.forEach(task => {
            totalCorrect += task.correctCount || 0;
            totalWrong += task.wrongCount || 0;

            const accuracy = task.wordCount > 0 ?
                Math.round((task.correctCount / task.wordCount) * 100) : 0;

            const cardHtml = `
                <div class="col-md-6 col-lg-4 mb-4">
                    <div class="card history-card" onclick="showTaskDetail(${task.id})">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-3">
                                <h5 class="card-title mb-0"><i class="bi bi-task-check me-2 text-primary"></i>${task.taskName}</h5>
                                <span class="badge bg-success badge-status">已完成</span>
                            </div>
                            <p class="text-muted mb-3">
                                <i class="bi bi-person me-1"></i>${task.dictator || '未知'} |
                                <i class="bi bi-calendar3 me-1"></i>${formatDate(task.createdAt)}
                            </p>
                            <div class="row text-center mb-3">
                                <div class="col-4"><div class="fs-4 fw-bold">${task.wordCount}</div><small class="text-muted">总数</small></div>
                                <div class="col-4"><div class="fs-4 fw-bold text-success">${task.correctCount}</div><small class="text-muted">正确</small></div>
                                <div class="col-4"><div class="fs-4 fw-bold text-danger">${task.wrongCount}</div><small class="text-muted">错误</small></div>
                            </div>
                            <div class="progress" style="height: 10px;">
                                <div class="progress-bar bg-success" style="width: ${accuracy}%">${accuracy}%</div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            container.innerHTML += cardHtml;
        });

        // 更新统计
        document.getElementById('totalTasks').textContent = tasks.length;
        document.getElementById('totalCorrect').textContent = totalCorrect;
        document.getElementById('totalWrong').textContent = totalWrong;
    }

    // 显示任务详情
    async function showTaskDetail(taskId) {
        try {
            const response = await fetch(`/api/tasks/${taskId}`);
            const result = await response.json();

            if (result.success && result.data) {
                const task = result.data;

                // 设置弹窗内容
                document.getElementById('modalTaskName').textContent = task.taskName;
                document.getElementById('modalDictator').textContent = task.dictator || '未知';
                document.getElementById('modalDate').textContent = formatDate(task.createdAt);
                document.getElementById('modalWordCount').textContent = task.wordCount;
                document.getElementById('modalCorrect').textContent = task.correctCount;
                document.getElementById('modalWrong').textContent = task.wrongCount;

                const accuracy = task.wordCount > 0 ?
                    Math.round((task.correctCount / task.wordCount) * 100) : 0;
                document.getElementById('modalProgress').style.width = accuracy + '%';
                document.getElementById('modalProgress').textContent = accuracy + '%';

                // 加载词语列表
                const wordListBody = document.getElementById('modalWordList');
                wordListBody.innerHTML = '';

                // 获取词语记录
                const recordResponse = await fetch(`/api/tasks/${taskId}/records`);
                const recordResult = await recordResponse.json();

                if (recordResult.success && recordResult.data && recordResult.data.length > 0) {
                    recordResult.data.forEach(record => {
                        const statusBadge = record.isCorrect ?
                            '<span class="badge bg-success">正确</span>' :
                            '<span class="badge bg-danger">错误</span>';

                        wordListBody.innerHTML += `
                            <tr>
                                <td><strong>${record.word}</strong></td>
                                <td>${statusBadge}</td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary" onclick="speakWord('${record.word}')">
                                        <i class="bi bi-volume-up"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                } else {
                    // 如果没有记录，显示词语列表
                    task.words.forEach(word => {
                        wordListBody.innerHTML += `
                            <tr>
                                <td><strong>${word}</strong></td>
                                <td><span class="badge bg-success">正确</span></td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary" onclick="speakWord('${word}')">
                                        <i class="bi bi-volume-up"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                }

                // 保存当前任务ID用于重听
                currentTaskId = taskId;

                const modal = new bootstrap.Modal(document.getElementById('detailModal'));
                modal.show();
            }
        } catch (error) {
            console.error('加载任务详情失败:', error);
        }
    }

    // 格式化日期
    function formatDate(dateStr) {
        if (!dateStr) return '-';
        const date = new Date(dateStr);
        return date.toLocaleDateString('zh-CN');
    }

    // 朗读词语
    function speakWord(word) {
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.8;
        speechSynthesis.speak(utterance);
    }

    // 重新听写
    async function replayTask() {
        if (!currentTaskId) {
            alert('无法重新听写');
            return;
        }

        try {
            const response = await fetch(`/api/tasks/${currentTaskId}`);
            const result = await response.json();

            if (result.success && result.data) {
                const task = result.data;
                // 重置任务进度
                await fetch(`/api/tasks/${currentTaskId}/reset-progress`, { method: 'POST' });
                // 跳转到首页
                window.location.href = '/';
            }
        } catch (error) {
            console.error('重新听写失败:', error);
            alert('操作失败，请重试');
        }
    }
</script>
</body>
</html>
