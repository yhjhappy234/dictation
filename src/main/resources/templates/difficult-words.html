<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{layout :: head('听写小助手 - 生词本')}"></head>
<body>
<!-- 导航栏 -->
<nav th:replace="~{layout :: navbar('difficult')}"></nav>

<div class="main-container">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap">
        <h2>
            <i class="bi bi-star me-2"></i>我的生词本
        </h2>
        <div class="mt-2 mt-md-0">
            <button class="btn btn-secondary btn-action" onclick="exportWords()">
                <i class="bi bi-download me-2"></i>导出生词
            </button>
            <button class="btn btn-primary btn-action" onclick="startPractice()">
                <i class="bi bi-lightning me-2"></i>针对性练习
            </button>
        </div>
    </div>

    <!-- 统计概览 -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-number text-danger" id="totalWords">0</div>
                <div class="stat-label">生词总数</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-number text-warning" id="newWords">0</div>
                <div class="stat-label">新学生词</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-number text-info" id="practicingWords">0</div>
                <div class="stat-label">练习中</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-number text-success" id="masteredWords">0</div>
                <div class="stat-label">已掌握</div>
            </div>
        </div>
    </div>

    <!-- 筛选区域 -->
    <div class="filter-section">
        <div class="row g-3 align-items-end">
            <div class="col-md-3">
                <label class="form-label fw-bold">搜索词语</label>
                <input type="text" class="form-control" id="searchInput" placeholder="输入词语搜索..." oninput="filterWords()">
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">掌握程度</label>
                <select class="form-select" id="masteryFilter" onchange="filterWords()">
                    <option value="">全部</option>
                    <option value="1">1星 - 刚认识</option>
                    <option value="2">2星 - 需练习</option>
                    <option value="3">3星 - 较熟悉</option>
                    <option value="4">4星 - 很熟悉</option>
                    <option value="5">5星 - 已掌握</option>
                </select>
            </div>
            <div class="col-md-3">
                <label class="form-label fw-bold">排序方式</label>
                <select class="form-select" id="sortBy" onchange="filterWords()">
                    <option value="recent">最近错误</option>
                    <option value="frequency">错误次数</option>
                    <option value="mastery">掌握程度</option>
                    <option value="alphabet">拼音顺序</option>
                </select>
            </div>
            <div class="col-md-3">
                <button class="btn btn-outline-danger w-100" onclick="clearMastered()">
                    <i class="bi bi-trash me-2"></i>清除已掌握
                </button>
            </div>
        </div>
    </div>

    <!-- 生词表格 -->
    <div class="card">
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead>
                        <tr>
                            <th style="width: 40px;">
                                <input type="checkbox" class="form-check-input" id="selectAll" onchange="toggleSelectAll()">
                            </th>
                            <th>词语</th>
                            <th>听写人</th>
                            <th>错误次数</th>
                            <th>练习次数</th>
                            <th>掌握度</th>
                            <th>最近练习</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="wordsTable">
                        <!-- 动态加载 -->
                    </tbody>
                </table>
            </div>

            <!-- 批量操作 -->
            <div class="d-flex justify-content-between align-items-center mt-3" id="batchActions" style="display: none !important;">
                <span id="selectedCount">已选择 0 个词语</span>
                <div>
                    <button class="btn btn-success me-2" onclick="batchPractice()">
                        <i class="bi bi-play-circle me-1"></i>批量练习
                    </button>
                    <button class="btn btn-danger" onclick="batchDelete()">
                        <i class="bi bi-trash me-1"></i>批量删除
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 分页 -->
    <nav aria-label="Page navigation" class="mt-4">
        <ul class="pagination justify-content-center" id="pagination">
        </ul>
    </nav>
</div>

<!-- 编辑弹窗 -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-pencil-square me-2"></i>编辑生词
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editWordId">
                <div class="mb-3">
                    <label class="form-label fw-bold">词语</label>
                    <input type="text" class="form-control" id="editWord" readonly>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">掌握程度</label>
                    <div class="star-rating" id="editStars">
                        <i class="bi bi-star" onclick="setMastery(1)"></i>
                        <i class="bi bi-star" onclick="setMastery(2)"></i>
                        <i class="bi bi-star" onclick="setMastery(3)"></i>
                        <i class="bi bi-star" onclick="setMastery(4)"></i>
                        <i class="bi bi-star" onclick="setMastery(5)"></i>
                    </div>
                    <input type="hidden" id="editMastery" value="1">
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">备注</label>
                    <textarea class="form-control" id="editNote" rows="3" placeholder="添加备注..."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="saveEdit()">
                    <i class="bi bi-check-lg me-1"></i>保存
                </button>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<footer th:replace="~{layout :: footer}"></footer>

<!-- 脚本 -->
<div th:replace="~{layout :: scripts}"></div>

<script>
    // 全局变量
    let difficultWords = [];
    let filteredWords = [];
    let selectedIds = [];
    let currentPage = 1;
    const pageSize = 10;
    let currentMastery = 1;

    // 页面加载
    document.addEventListener('DOMContentLoaded', function() {
        loadDifficultWords();
    });

    // 加载生词
    async function loadDifficultWords() {
        try {
            const response = await fetch('/api/difficult-words');
            if (response.ok) {
                const result = await response.json();
                if (result.success && result.data) {
                    difficultWords = result.data;
                } else {
                    difficultWords = [];
                }
            } else {
                // 使用模拟数据
                loadMockData();
            }
        } catch (error) {
            console.error('加载生词失败:', error);
            loadMockData();
        }
        filterWords();
    }

    // 模拟数据
    function loadMockData() {
        difficultWords = [
            { id: 1, word: '踌躇', errorCount: 5, practiceCount: 3, masteryLevel: 1, lastPractice: '2024-01-15', note: '注意读音' },
            { id: 2, word: '踉跄', errorCount: 4, practiceCount: 2, masteryLevel: 2, lastPractice: '2024-01-14', note: '' },
            { id: 3, word: '蹒跚', errorCount: 3, practiceCount: 4, masteryLevel: 3, lastPractice: '2024-01-14', note: '' },
            { id: 4, word: '巍峨', errorCount: 2, practiceCount: 5, masteryLevel: 4, lastPractice: '2024-01-13', note: '山峰高大' },
            { id: 5, word: '蜿蜒', errorCount: 4, practiceCount: 2, masteryLevel: 2, lastPractice: '2024-01-13', note: '' },
            { id: 6, word: '璀璨', errorCount: 6, practiceCount: 1, masteryLevel: 1, lastPractice: '2024-01-12', note: '注意璀璨的写法' },
            { id: 7, word: '涟漪', errorCount: 2, practiceCount: 3, masteryLevel: 3, lastPractice: '2024-01-12', note: '' },
            { id: 8, word: '朦胧', errorCount: 1, practiceCount: 6, masteryLevel: 5, lastPractice: '2024-01-11', note: '已掌握' },
            { id: 9, word: '憧憬', errorCount: 3, practiceCount: 2, masteryLevel: 2, lastPractice: '2024-01-11', note: '' },
            { id: 10, word: '徜徉', errorCount: 2, practiceCount: 4, masteryLevel: 3, lastPractice: '2024-01-10', note: '' },
            { id: 11, word: '涟漪', errorCount: 1, practiceCount: 5, masteryLevel: 4, lastPractice: '2024-01-10', note: '' },
            { id: 12, word: '婀娜', errorCount: 4, practiceCount: 1, masteryLevel: 1, lastPractice: '2024-01-09', note: '' }
        ];
    }

    // 筛选词语
    function filterWords() {
        const search = document.getElementById('searchInput').value.toLowerCase();
        const mastery = document.getElementById('masteryFilter').value;
        const sortBy = document.getElementById('sortBy').value;

        filteredWords = difficultWords.filter(function(w) {
            const wordText = w.wordText || w.word || '';
            const matchSearch = !search || wordText.toLowerCase().includes(search);
            const matchMastery = !mastery || w.masteryLevel === parseInt(mastery);
            return matchSearch && matchMastery;
        });

        // 排序
        filteredWords.sort(function(a, b) {
            switch (sortBy) {
                case 'recent':
                    return new Date(b.lastPracticeDate || b.lastPractice) - new Date(a.lastPracticeDate || a.lastPractice);
                case 'frequency':
                    return b.errorCount - a.errorCount;
                case 'mastery':
                    return a.masteryLevel - b.masteryLevel;
                case 'alphabet':
                    return (a.wordText || a.word || '').localeCompare((b.wordText || b.word || ''), 'zh-CN');
                default:
                    return 0;
            }
        });

        currentPage = 1;
        renderTable();
        renderPagination();
        updateStats();
    }

    // 渲染表格
    function renderTable() {
        const tbody = document.getElementById('wordsTable');
        tbody.innerHTML = '';

        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const pageWords = filteredWords.slice(start, end);

        if (pageWords.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="text-center py-5"><i class="bi bi-inbox" style="font-size: 3rem; color: #ccc;"></i><p class="mt-2 text-muted">暂无生词</p></td></tr>';
            return;
        }

        pageWords.forEach(function(w) {
            const stars = renderStars(w.masteryLevel);
            const checkedAttr = selectedIds.includes(w.id) ? 'checked' : '';
            const dictatorDisplay = w.dictator ? '<span class="badge bg-secondary">' + w.dictator + '</span>' : '-';

            tbody.innerHTML += '<tr>' +
                '<td><input type="checkbox" class="form-check-input word-checkbox" data-id="' + w.id + '" ' + checkedAttr + ' onchange="toggleSelect(' + w.id + ')"></td>' +
                '<td><strong class="fs-5">' + w.wordText + '</strong>' + (w.note ? '<br><small class="text-muted">' + w.note + '</small>' : '') + '</td>' +
                '<td>' + dictatorDisplay + '</td>' +
                '<td><span class="badge bg-danger">' + w.errorCount + '</span></td>' +
                '<td><span class="badge bg-info">' + (w.practiceCount || 0) + '</span></td>' +
                '<td>' + stars + '</td>' +
                '<td>' + (w.lastPracticeDate ? w.lastPracticeDate.split('T')[0] : '-') + '</td>' +
                '<td>' +
                '<button class="btn btn-sm btn-outline-primary me-1" onclick="speakWord(\'' + w.wordText + '\')" title="朗读"><i class="bi bi-volume-up"></i></button>' +
                '<button class="btn btn-sm btn-outline-success me-1" onclick="practiceWord(' + w.id + ')" title="练习"><i class="bi bi-lightning"></i></button>' +
                '<button class="btn btn-sm btn-outline-secondary me-1" onclick="editWord(' + w.id + ')" title="编辑"><i class="bi bi-pencil"></i></button>' +
                '<button class="btn btn-sm btn-outline-danger" onclick="deleteWord(' + w.id + ')" title="删除"><i class="bi bi-trash"></i></button>' +
                '</td>' +
                '</tr>';
        });

        updateBatchActions();
    }

    // 渲染星级
    function renderStars(level) {
        let html = '<span class="star-rating">';
        for (let i = 1; i <= 5; i++) {
            if (i <= level) {
                html += '<i class="bi bi-star-fill" style="color: #FFE66D;"></i>';
            } else {
                html += '<i class="bi bi-star" style="color: #ccc;"></i>';
            }
        }
        html += '</span>';
        return html;
    }

    // 渲染分页
    function renderPagination() {
        const container = document.getElementById('pagination');
        container.innerHTML = '';

        const totalPages = Math.ceil(filteredWords.length / pageSize);
        if (totalPages <= 1) return;

        // 上一页
        const prevDisabled = currentPage === 1 ? 'disabled' : '';
        container.innerHTML += '<li class="page-item ' + prevDisabled + '"><a class="page-link" href="#" onclick="goToPage(' + (currentPage - 1) + '); return false;"><i class="bi bi-chevron-left"></i></a></li>';

        // 页码
        for (let i = 1; i <= totalPages; i++) {
            const activeClass = i === currentPage ? 'active' : '';
            container.innerHTML += '<li class="page-item ' + activeClass + '"><a class="page-link" href="#" onclick="goToPage(' + i + '); return false;">' + i + '</a></li>';
        }

        // 下一页
        const nextDisabled = currentPage === totalPages ? 'disabled' : '';
        container.innerHTML += '<li class="page-item ' + nextDisabled + '"><a class="page-link" href="#" onclick="goToPage(' + (currentPage + 1) + '); return false;"><i class="bi bi-chevron-right"></i></a></li>';
    }

    // 跳转页面
    function goToPage(page) {
        const totalPages = Math.ceil(filteredWords.length / pageSize);
        if (page < 1 || page > totalPages) return;
        currentPage = page;
        renderTable();
    }

    // 更新统计
    function updateStats() {
        document.getElementById('totalWords').textContent = difficultWords.length;
        document.getElementById('newWords').textContent = difficultWords.filter(function(w) { return w.masteryLevel === 1; }).length;
        document.getElementById('practicingWords').textContent = difficultWords.filter(function(w) { return w.masteryLevel >= 2 && w.masteryLevel <= 3; }).length;
        document.getElementById('masteredWords').textContent = difficultWords.filter(function(w) { return w.masteryLevel >= 4; }).length;
    }

    // 选择相关
    function toggleSelectAll() {
        const selectAll = document.getElementById('selectAll').checked;
        const checkboxes = document.querySelectorAll('.word-checkbox');

        if (selectAll) {
            selectedIds = filteredWords.map(function(w) { return w.id; });
        } else {
            selectedIds = [];
        }

        checkboxes.forEach(function(cb) {
            cb.checked = selectAll;
        });

        updateBatchActions();
    }

    function toggleSelect(id) {
        const index = selectedIds.indexOf(id);
        if (index > -1) {
            selectedIds.splice(index, 1);
        } else {
            selectedIds.push(id);
        }

        // 更新全选状态
        const checkboxes = document.querySelectorAll('.word-checkbox');
        const allChecked = Array.from(checkboxes).every(function(cb) { return cb.checked; });
        document.getElementById('selectAll').checked = allChecked;

        updateBatchActions();
    }

    function updateBatchActions() {
        const batchActions = document.getElementById('batchActions');
        const selectedCount = document.getElementById('selectedCount');

        if (selectedIds.length > 0) {
            batchActions.style.display = 'flex';
            selectedCount.textContent = '已选择 ' + selectedIds.length + ' 个词语';
        } else {
            batchActions.style.display = 'none';
        }
    }

    // 朗读词语
    function speakWord(word) {
        const synth = window.speechSynthesis;
        const utterance = new SpeechSynthesisUtterance(word);
        utterance.lang = 'zh-CN';
        utterance.rate = 0.8;
        synth.speak(utterance);
    }

    // 练习单个词语
    function practiceWord(id) {
        const word = difficultWords.find(function(w) { return w.id === id; });
        if (word) {
            localStorage.setItem('dictationWords', word.word);
            window.location.href = '/';
        }
    }

    // 编辑词语
    function editWord(id) {
        const word = difficultWords.find(function(w) { return w.id === id; });
        if (!word) return;

        document.getElementById('editWordId').value = id;
        document.getElementById('editWord').value = word.word;
        document.getElementById('editMastery').value = word.masteryLevel;
        document.getElementById('editNote').value = word.note || '';
        currentMastery = word.masteryLevel;
        updateEditStars();

        const modal = new bootstrap.Modal(document.getElementById('editModal'));
        modal.show();
    }

    // 设置掌握度
    function setMastery(level) {
        currentMastery = level;
        document.getElementById('editMastery').value = level;
        updateEditStars();
    }

    // 更新编辑弹窗星级显示
    function updateEditStars() {
        const container = document.getElementById('editStars');
        let html = '';
        for (let i = 1; i <= 5; i++) {
            const starClass = i <= currentMastery ? 'bi-star-fill' : 'bi-star';
            const color = i <= currentMastery ? 'color: #FFE66D; cursor: pointer;' : 'color: #ccc; cursor: pointer;';
            html += '<i class="bi ' + starClass + '" style="' + color + '" onclick="setMastery(' + i + ')"></i>';
        }
        container.innerHTML = html;
    }

    // 保存编辑
    async function saveEdit() {
        const id = parseInt(document.getElementById('editWordId').value);
        const mastery = parseInt(document.getElementById('editMastery').value);
        const note = document.getElementById('editNote').value;

        // 更新本地数据
        const word = difficultWords.find(function(w) { return w.id === id; });
        if (word) {
            word.masteryLevel = mastery;
            word.note = note;
        }

        // 尝试保存到后端
        try {
            await fetch('/api/difficult-words/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ masteryLevel: mastery, note: note })
            });
        } catch (error) {
            console.error('保存失败:', error);
        }

        bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
        filterWords();
    }

    // 删除词语
    async function deleteWord(id) {
        if (!confirm('确定要删除这个生词吗？')) return;

        difficultWords = difficultWords.filter(function(w) { return w.id !== id; });
        selectedIds = selectedIds.filter(function(sid) { return sid !== id; });

        try {
            await fetch('/api/difficult-words/' + id, { method: 'DELETE' });
        } catch (error) {
            console.error('删除失败:', error);
        }

        filterWords();
    }

    // 批量练习
    function batchPractice() {
        if (selectedIds.length === 0) return;

        const words = difficultWords
            .filter(function(w) { return selectedIds.includes(w.id); })
            .map(function(w) { return w.word; })
            .join('\n');

        localStorage.setItem('dictationWords', words);
        localStorage.setItem('dictationBatchName', '生词练习');
        window.location.href = '/';
    }

    // 批量删除
    async function batchDelete() {
        if (selectedIds.length === 0) return;
        if (!confirm('确定要删除选中的 ' + selectedIds.length + ' 个生词吗？')) return;

        difficultWords = difficultWords.filter(function(w) { return !selectedIds.includes(w.id); });
        selectedIds = [];

        try {
            await fetch('/api/difficult-words/batch', {
                method: 'DELETE',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ids: selectedIds })
            });
        } catch (error) {
            console.error('批量删除失败:', error);
        }

        filterWords();
    }

    // 开始针对性练习
    function startPractice() {
        const lowMasteryWords = difficultWords
            .filter(function(w) { return w.masteryLevel <= 2; })
            .map(function(w) { return w.word; });

        if (lowMasteryWords.length === 0) {
            alert('没有需要练习的生词，继续加油！');
            return;
        }

        localStorage.setItem('dictationWords', lowMasteryWords.join('\n'));
        localStorage.setItem('dictationBatchName', '生词针对性练习');
        window.location.href = '/';
    }

    // 导出生词
    function exportWords() {
        const content = filteredWords.map(function(w) {
            return w.word + '\t' + w.masteryLevel + '星\t' + '错误' + w.errorCount + '次\t' + w.note;
        }).join('\n');

        const header = '词语\t掌握度\t错误次数\t备注\n';
        const blob = new Blob([header + content], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '生词本_' + new Date().toLocaleDateString() + '.txt';
        a.click();
        URL.revokeObjectURL(url);
    }

    // 清除已掌握
    function clearMastered() {
        const masteredCount = difficultWords.filter(function(w) { return w.masteryLevel >= 5; }).length;
        if (masteredCount === 0) {
            alert('没有已掌握的词语需要清除');
            return;
        }

        if (!confirm('确定要清除 ' + masteredCount + ' 个已掌握的词语吗？')) return;

        difficultWords = difficultWords.filter(function(w) { return w.masteryLevel < 5; });
        filterWords();
    }
</script>
</body>
</html>
