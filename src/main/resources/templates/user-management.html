<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{layout :: head('听写小助手 - 用户管理')}"></head>
<body>
<!-- 导航栏 -->
<nav th:replace="~{layout :: navbar('user-management')}"></nav>

<div class="main-container">
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-person-badge me-2"></i>用户管理</span>
            <button class="btn btn-sm btn-outline-light" onclick="showAddUserModal()">
                <i class="bi bi-plus-lg me-1"></i>添加用户
            </button>
        </div>
        <div class="card-body">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                        <tr>
                            <th>头像</th>
                            <th>用户名</th>
                            <th>角色</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="userTableBody">
                        <!-- 用户列表将通过JS动态生成 -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- 添加用户模态框 -->
<div class="modal fade" id="addUserModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-plus-lg me-2"></i>添加用户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addUserForm">
                    <div class="mb-3">
                        <label class="form-label">用户名</label>
                        <input type="text" class="form-control" id="newUsername" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">密码</label>
                        <input type="password" class="form-control" id="newUserPassword" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">角色</label>
                        <select class="form-select" id="newUserRole">
                            <option value="USER">普通用户</option>
                            <option value="ADMIN">管理员</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="addUser()">添加</button>
            </div>
        </div>
    </div>
</div>

<!-- 编辑用户模态框 -->
<div class="modal fade" id="editUserModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pencil me-2"></i>编辑用户</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="editUserForm">
                    <input type="hidden" id="editUserId">
                    <div class="mb-3">
                        <label class="form-label">角色</label>
                        <select class="form-select" id="editUserRole">
                            <option value="USER">普通用户</option>
                            <option value="ADMIN">管理员</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">状态</label>
                        <select class="form-select" id="editUserStatus">
                            <option value="ACTIVE">活跃</option>
                            <option value="DISABLED">禁用</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                <button type="button" class="btn btn-primary" onclick="updateUser()">保存</button>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<footer th:replace="~{layout :: footer}"></footer>

<!-- 脚本 -->
<div th:replace="~{layout :: scripts}"></div>

<script>
    // 加载用户列表
    async function loadUsers() {
        try {
            const response = await fetch('/api/users', { credentials: 'include' });
            const result = await response.json();
            if (result.success && result.data) {
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';
                result.data.forEach(user => {
                    const roleBadge = user.role === 'ADMIN'
                        ? '<span class="badge bg-danger">管理员</span>'
                        : '<span class="badge bg-primary">普通用户</span>';
                    const statusBadge = user.status === 'ACTIVE'
                        ? '<span class="badge bg-success">活跃</span>'
                        : '<span class="badge bg-secondary">禁用</span>';

                    tbody.innerHTML += `
                        <tr>
                            <td><img src="/images/avatars/${user.avatar}" class="rounded-circle" width="40" height="40" alt="头像"></td>
                            <td><strong>${user.username}</strong></td>
                            <td>${roleBadge}</td>
                            <td>${statusBadge}</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary" onclick="showEditUserModal(${user.id}, '${user.role}', '${user.status}')">
                                    <i class="bi bi-pencil"></i>
                                </button>
                                <button class="btn btn-sm btn-outline-danger" onclick="deleteUser(${user.id}, '${user.username}')">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `;
                });
            } else {
                showToast(result.message || '加载失败', 'warning');
            }
        } catch (error) {
            console.error('加载用户列表失败:', error);
            showToast('加载失败', 'warning');
        }
    }

    // 显示添加用户模态框
    function showAddUserModal() {
        document.getElementById('addUserForm').reset();
        new bootstrap.Modal(document.getElementById('addUserModal')).show();
    }

    // 添加用户
    async function addUser() {
        const username = document.getElementById('newUsername').value.trim();
        const password = document.getElementById('newUserPassword').value;
        const role = document.getElementById('newUserRole').value;

        if (!username) {
            showToast('用户名不能为空', 'warning');
            return;
        }
        if (!password || password.length < 6) {
            showToast('密码长度至少6位', 'warning');
            return;
        }

        try {
            const response = await fetch('/api/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ username, password, role })
            });
            const result = await response.json();
            if (result.success) {
                bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
                loadUsers();
                showToast('用户添加成功', 'success');
            } else {
                showToast(result.message || '添加失败', 'warning');
            }
        } catch (error) {
            console.error('添加用户失败:', error);
            showToast('添加失败', 'warning');
        }
    }

    // 显示编辑用户模态框
    function showEditUserModal(id, role, status) {
        document.getElementById('editUserId').value = id;
        document.getElementById('editUserRole').value = role;
        document.getElementById('editUserStatus').value = status;
        new bootstrap.Modal(document.getElementById('editUserModal')).show();
    }

    // 更新用户
    async function updateUser() {
        const id = document.getElementById('editUserId').value;
        const role = document.getElementById('editUserRole').value;
        const status = document.getElementById('editUserStatus').value;

        try {
            const response = await fetch('/api/users/' + id, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify({ role, status })
            });
            const result = await response.json();
            if (result.success) {
                bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
                loadUsers();
                showToast('用户更新成功', 'success');
            } else {
                showToast(result.message || '更新失败', 'warning');
            }
        } catch (error) {
            console.error('更新用户失败:', error);
            showToast('更新失败', 'warning');
        }
    }

    // 删除用户
    async function deleteUser(id, username) {
        if (!confirm(`确定要删除用户 "${username}" 吗？`)) {
            return;
        }

        try {
            const response = await fetch('/api/users/' + id, {
                method: 'DELETE',
                credentials: 'include'
            });
            const result = await response.json();
            if (result.success) {
                loadUsers();
                showToast('用户删除成功', 'success');
            } else {
                showToast(result.message || '删除失败', 'warning');
            }
        } catch (error) {
            console.error('删除用户失败:', error);
            showToast('删除失败', 'warning');
        }
    }

    // 页面加载时
    document.addEventListener('DOMContentLoaded', loadUsers);
</script>
</body>
</html>
