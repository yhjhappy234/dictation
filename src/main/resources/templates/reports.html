<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{layout :: head('听写小助手 - 学习报表')}"></head>
<body>
<!-- 导航栏 -->
<nav th:replace="~{layout :: navbar('reports')}"></nav>

<div class="main-container">
    <h2 class="mb-4">
        <i class="bi bi-graph-up me-2"></i>学习报表
    </h2>

    <!-- 听写人筛选（标签形式） -->
    <div class="mb-4">
        <label class="form-label fw-bold mb-2">听写人筛选：</label>
        <div id="dictatorTags">
            <!-- 标签将通过JavaScript动态生成 -->
        </div>
    </div>

    <!-- 总体统计 -->
    <div class="row mb-4">
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-number" id="totalTasks">0</div>
                <div class="stat-label">已完成任务</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-number" id="totalWords">0</div>
                <div class="stat-label">总听写词语</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-number text-success" id="totalCorrect">0</div>
                <div class="stat-label">总正确数</div>
            </div>
        </div>
        <div class="col-md-3">
            <div class="stat-card">
                <div class="stat-number" id="avgAccuracy">0%</div>
                <div class="stat-label">平均正确率</div>
            </div>
        </div>
    </div>

    <!-- 报表切换标签 -->
    <ul class="nav nav-tabs mb-4" id="reportTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="daily-tab" data-bs-toggle="tab" data-bs-target="#daily" type="button" role="tab">
                <i class="bi bi-calendar-day me-1"></i>日报表
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="weekly-tab" data-bs-toggle="tab" data-bs-target="#weekly" type="button" role="tab">
                <i class="bi bi-calendar-week me-1"></i>周报表
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="monthly-tab" data-bs-toggle="tab" data-bs-target="#monthly" type="button" role="tab">
                <i class="bi bi-calendar-month me-1"></i>月报表
            </button>
        </li>
    </ul>

    <div class="tab-content" id="reportContent">
        <!-- 日报表 -->
        <div class="tab-pane fade show active" id="daily" role="tabpanel">
            <!-- 今日统计 -->
            <div class="row mb-4">
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-number" id="dailyTasks">0</div>
                        <div class="stat-label">今日完成任务</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-number text-success" id="dailyCorrect">0</div>
                        <div class="stat-label">今日正确数</div>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="stat-card">
                        <div class="stat-number text-danger" id="dailyWrong">0</div>
                        <div class="stat-label">今日错误数</div>
                    </div>
                </div>
            </div>

            <!-- 今日任务正确率图表 -->
            <div class="chart-container mb-4">
                <h5 class="mb-3">今日任务正确率</h5>
                <div id="dailyChart" style="height: 350px;"></div>
            </div>

            <!-- 今日任务列表 -->
            <div class="card">
                <div class="card-header">
                    <i class="bi bi-list-check me-2"></i>今日完成任务
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>任务名称</th>
                                    <th>听写人</th>
                                    <th>词语数</th>
                                    <th>正确</th>
                                    <th>错误</th>
                                    <th>正确率</th>
                                </tr>
                            </thead>
                            <tbody id="dailyTasksTable">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 周报表 -->
        <div class="tab-pane fade" id="weekly" role="tabpanel">
            <!-- 本周统计 -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-number" id="weeklyTasks">0</div>
                        <div class="stat-label">本周完成任务</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-number" id="weeklyWords">0</div>
                        <div class="stat-label">词语总数</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-number" id="weeklyAvgAccuracy">0%</div>
                        <div class="stat-label">平均正确率</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-number" id="weeklyStudyDays">0</div>
                        <div class="stat-label">学习天数</div>
                    </div>
                </div>
            </div>

            <!-- 每日趋势图 -->
            <div class="chart-container mb-4">
                <h5 class="mb-3">本周每日趋势</h5>
                <div id="weeklyTrendChart" style="height: 350px;"></div>
            </div>
        </div>

        <!-- 月报表 -->
        <div class="tab-pane fade" id="monthly" role="tabpanel">
            <!-- 本月统计 -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-number" id="monthlyTasks">0</div>
                        <div class="stat-label">本月完成任务</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-number" id="monthlyWords">0</div>
                        <div class="stat-label">词语总数</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-number" id="monthlyAvgAccuracy">0%</div>
                        <div class="stat-label">平均正确率</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="stat-card">
                        <div class="stat-number" id="monthlyStudyDays">0</div>
                        <div class="stat-label">学习天数</div>
                    </div>
                </div>
            </div>

            <!-- 每日听写数量图 -->
            <div class="chart-container mb-4">
                <h5 class="mb-3">本月每日听写数量</h5>
                <div id="monthlyChart" style="height: 400px;"></div>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<footer th:replace="~{layout :: footer}"></footer>

<!-- 脚本 -->
<div th:replace="~{layout :: scripts}"></div>
<!-- ECharts -->
<script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>

<script>
    // 全局变量
    let allTasks = [];
    let filteredTasks = [];
    let currentDictator = '';
    let dailyChart, weeklyTrendChart, monthlyChart;

    // 页面加载
    document.addEventListener('DOMContentLoaded', function() {
        loadTasks();
        loadDictators();

        // 监听标签切换
        document.getElementById('weekly-tab').addEventListener('shown.bs.tab', function() {
            if (weeklyTrendChart) weeklyTrendChart.resize();
        });
        document.getElementById('monthly-tab').addEventListener('shown.bs.tab', function() {
            if (monthlyChart) monthlyChart.resize();
        });
    });

    // 加载听写人列表
    async function loadDictators() {
        try {
            const response = await fetch('/api/tasks/dictators');
            const result = await response.json();

            if (result.success && result.data) {
                renderDictatorTags(result.data);
            }
        } catch (error) {
            console.error('加载听写人列表失败:', error);
        }
    }

    // 渲染听写人标签
    function renderDictatorTags(dictators) {
        const container = document.getElementById('dictatorTags');
        container.innerHTML = '';

        // 添加"所有人"标签（默认选中）- 使用更柔和的选中样式
        const allTag = document.createElement('button');
        allTag.className = 'btn btn-sm btn-light border-secondary me-2 mb-2 dictator-tag';
        allTag.style.backgroundColor = '#f8f9fa';
        allTag.style.borderColor = '#dee2e6';
        allTag.textContent = '所有人';
        allTag.dataset.dictator = '';
        allTag.onclick = function() { selectDictator('', this); };
        container.appendChild(allTag);

        // 添加每个听写人的标签
        dictators.forEach(dictator => {
            const tag = document.createElement('button');
            tag.className = 'btn btn-sm btn-outline-light text-secondary me-2 mb-2 dictator-tag';
            tag.textContent = dictator;
            tag.dataset.dictator = dictator;
            tag.onclick = function() { selectDictator(dictator, this); };
            container.appendChild(tag);
        });
    }

    // 选择听写人
    function selectDictator(dictator, clickedBtn) {
        currentDictator = dictator;

        // 更新标签样式（柔和的选中样式，与导航菜单区分）
        document.querySelectorAll('.dictator-tag').forEach(btn => {
            if (btn.dataset.dictator === dictator) {
                // 选中：柔和的浅灰背景
                btn.className = 'btn btn-sm btn-light border-secondary me-2 mb-2 dictator-tag';
                btn.style.backgroundColor = '#f8f9fa';
                btn.style.borderColor = '#dee2e6';
            } else {
                // 未选中：非常柔和的轮廓
                btn.className = 'btn btn-sm btn-outline-light text-secondary me-2 mb-2 dictator-tag';
                btn.style.backgroundColor = '';
                btn.style.borderColor = '';
            }
        });

        // 筛选数据
        if (currentDictator) {
            filteredTasks = allTasks.filter(task => task.dictator === currentDictator);
        } else {
            filteredTasks = allTasks;
        }

        renderAllReports();
    }

    // 加载所有已完成任务
    async function loadTasks() {
        try {
            const response = await fetch('/api/tasks/status/COMPLETED');
            const result = await response.json();

            if (result.success && result.data) {
                allTasks = result.data;
                filteredTasks = allTasks;
                renderAllReports();
            }
        } catch (error) {
            console.error('加载任务数据失败:', error);
        }
    }

    // 渲染所有报表
    function renderAllReports() {
        renderAllStats();
        renderDailyReport();
        renderWeeklyReport();
        renderMonthlyReport();
    }

    // 渲染总体统计
    function renderAllStats() {
        let totalCorrect = 0;
        let totalWrong = 0;

        filteredTasks.forEach(task => {
            totalCorrect += task.correctCount || 0;
            totalWrong += task.wrongCount || 0;
        });

        const totalWords = totalCorrect + totalWrong;
        const avgAccuracy = totalWords > 0 ? Math.round(totalCorrect / totalWords * 100) : 0;

        document.getElementById('totalTasks').textContent = filteredTasks.length;
        document.getElementById('totalWords').textContent = totalWords;
        document.getElementById('totalCorrect').textContent = totalCorrect;
        document.getElementById('avgAccuracy').textContent = avgAccuracy + '%';
    }

    // 渲染日报表
    function renderDailyReport() {
        const today = new Date().toLocaleDateString('zh-CN');
        const todayTasks = filteredTasks.filter(task => {
            const taskDate = new Date(task.createdAt).toLocaleDateString('zh-CN');
            return taskDate === today;
        });

        let dailyCorrect = 0;
        let dailyWrong = 0;

        todayTasks.forEach(task => {
            dailyCorrect += task.correctCount || 0;
            dailyWrong += task.wrongCount || 0;
        });

        document.getElementById('dailyTasks').textContent = todayTasks.length;
        document.getElementById('dailyCorrect').textContent = dailyCorrect;
        document.getElementById('dailyWrong').textContent = dailyWrong;

        // 渲染今日任务表格
        const tbody = document.getElementById('dailyTasksTable');
        tbody.innerHTML = '';

        if (todayTasks.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">今日暂无完成的任务</td></tr>';
        } else {
            todayTasks.forEach(task => {
                const accuracy = task.wordCount > 0 ? Math.round((task.correctCount / task.wordCount) * 100) : 0;
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${task.taskName}</strong></td>
                        <td>${task.dictator || '未知'}</td>
                        <td>${task.wordCount}</td>
                        <td><span class="badge bg-success">${task.correctCount}</span></td>
                        <td><span class="badge bg-danger">${task.wrongCount}</span></td>
                        <td>
                            <div class="progress" style="height: 20px; width: 100px;">
                                <div class="progress-bar bg-success" style="width: ${accuracy}%">${accuracy}%</div>
                            </div>
                        </td>
                    </tr>
                `;
            });
        }

        // 绘制今日任务正确率图表
        const taskNames = todayTasks.map(task => task.taskName);
        const correctRates = todayTasks.map(task => {
            return task.wordCount > 0 ? Math.round((task.correctCount / task.wordCount) * 100) : 0;
        });

        dailyChart = echarts.init(document.getElementById('dailyChart'));
        dailyChart.setOption({
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'shadow' },
                formatter: function(params) {
                    return params[0].name + '<br/>正确率: ' + params[0].value + '%';
                }
            },
            xAxis: {
                type: 'category',
                data: taskNames,
                axisLabel: {
                    fontSize: 12,
                    interval: 0,
                    rotate: taskNames.length > 3 ? 15 : 0
                }
            },
            yAxis: {
                type: 'value',
                max: 100,
                axisLabel: { fontSize: 12 }
            },
            series: [{
                data: correctRates,
                type: 'bar',
                itemStyle: {
                    color: function(params) {
                        if (params.value >= 80) return '#28a745';
                        if (params.value >= 60) return '#ffc107';
                        return '#dc3545';
                    }
                },
                label: {
                    show: true,
                    position: 'top',
                    formatter: '{c}%',
                    fontSize: 12
                }
            }],
            grid: { left: '10%', right: '10%', bottom: '15%', top: '15%' }
        });
    }

    // 渲染周报表
    function renderWeeklyReport() {
        const now = new Date();
        const weekStart = new Date(now);
        weekStart.setDate(now.getDate() - now.getDay() + 1); // 周一
        weekStart.setHours(0, 0, 0, 0);

        // 获取本周的日期字符串列表（用于比较）
        const weekDates = [];
        for (let i = 0; i < 7; i++) {
            const dayDate = new Date(weekStart);
            dayDate.setDate(weekStart.getDate() + i);
            weekDates.push(dayDate.toLocaleDateString('zh-CN'));
        }

        // 使用日期字符串比较，避免时区问题
        const weekTasks = filteredTasks.filter(task => {
            const taskDateStr = new Date(task.createdAt).toLocaleDateString('zh-CN');
            return weekDates.includes(taskDateStr);
        });

        let weeklyCorrect = 0;
        let weeklyWrong = 0;
        const studyDays = new Set();

        weekTasks.forEach(task => {
            weeklyCorrect += task.correctCount || 0;
            weeklyWrong += task.wrongCount || 0;
            studyDays.add(new Date(task.createdAt).toLocaleDateString('zh-CN'));
        });

        const weeklyWords = weeklyCorrect + weeklyWrong;
        const weeklyAvgAccuracy = weeklyWords > 0 ? Math.round(weeklyCorrect / weeklyWords * 100) : 0;

        document.getElementById('weeklyTasks').textContent = weekTasks.length;
        document.getElementById('weeklyWords').textContent = weeklyWords;
        document.getElementById('weeklyAvgAccuracy').textContent = weeklyAvgAccuracy + '%';
        document.getElementById('weeklyStudyDays').textContent = studyDays.size;

        // 绘制每日趋势图
        const dailyData = [];
        const dayNames = ['周一', '周二', '周三', '周四', '周五', '周六', '周日'];

        for (let i = 0; i < 7; i++) {
            const dayDate = new Date(weekStart);
            dayDate.setDate(weekStart.getDate() + i);
            const dayStr = dayDate.toLocaleDateString('zh-CN');

            const dayTasks = weekTasks.filter(task => {
                return new Date(task.createdAt).toLocaleDateString('zh-CN') === dayStr;
            });

            let dayCorrect = 0;
            let dayWrong = 0;
            dayTasks.forEach(task => {
                dayCorrect += task.correctCount || 0;
                dayWrong += task.wrongCount || 0;
            });

            dailyData.push({
                day: dayNames[i],
                words: dayCorrect + dayWrong,
                correct: dayCorrect
            });
        }

        weeklyTrendChart = echarts.init(document.getElementById('weeklyTrendChart'));
        weeklyTrendChart.setOption({
            tooltip: { trigger: 'axis' },
            legend: { data: ['听写词语', '正确词语'], textStyle: { fontSize: 14 } },
            xAxis: {
                type: 'category',
                data: dailyData.map(d => d.day),
                axisLabel: { fontSize: 14 }
            },
            yAxis: {
                type: 'value',
                axisLabel: { fontSize: 14 }
            },
            series: [
                {
                    name: '听写词语',
                    type: 'bar',
                    data: dailyData.map(d => d.words),
                    itemStyle: { color: '#FF6B6B' }
                },
                {
                    name: '正确词语',
                    type: 'bar',
                    data: dailyData.map(d => d.correct),
                    itemStyle: { color: '#4ECDC4' }
                }
            ],
            grid: { left: '10%', right: '10%', bottom: '15%', top: '20%' }
        });
    }

    // 渲染月报表
    function renderMonthlyReport() {
        const now = new Date();
        const monthStart = new Date(now.getFullYear(), now.getMonth(), 1);
        monthStart.setHours(0, 0, 0, 0);

        const monthTasks = filteredTasks.filter(task => {
            const taskDate = new Date(task.createdAt);
            return taskDate >= monthStart;
        });

        let monthlyCorrect = 0;
        let monthlyWrong = 0;
        const studyDays = new Set();

        monthTasks.forEach(task => {
            monthlyCorrect += task.correctCount || 0;
            monthlyWrong += task.wrongCount || 0;
            studyDays.add(new Date(task.createdAt).toLocaleDateString('zh-CN'));
        });

        const monthlyWords = monthlyCorrect + monthlyWrong;
        const monthlyAvgAccuracy = monthlyWords > 0 ? Math.round(monthlyCorrect / monthlyWords * 100) : 0;

        document.getElementById('monthlyTasks').textContent = monthTasks.length;
        document.getElementById('monthlyWords').textContent = monthlyWords;
        document.getElementById('monthlyAvgAccuracy').textContent = monthlyAvgAccuracy + '%';
        document.getElementById('monthlyStudyDays').textContent = studyDays.size;

        // 绘制每日听写数量图
        const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
        const dailyWords = [];

        for (let i = 1; i <= daysInMonth; i++) {
            const dayDate = new Date(now.getFullYear(), now.getMonth(), i);
            const dayStr = dayDate.toLocaleDateString('zh-CN');

            const dayTasks = monthTasks.filter(task => {
                return new Date(task.createdAt).toLocaleDateString('zh-CN') === dayStr;
            });

            let dayWords = 0;
            dayTasks.forEach(task => {
                dayWords += task.wordCount || 0;
            });

            dailyWords.push({
                day: i + '日',
                words: dayWords
            });
        }

        monthlyChart = echarts.init(document.getElementById('monthlyChart'));
        monthlyChart.setOption({
            tooltip: { trigger: 'axis' },
            xAxis: {
                type: 'category',
                data: dailyWords.map(d => d.day),
                axisLabel: {
                    fontSize: 12,
                    interval: 2,
                    rotate: 30
                }
            },
            yAxis: {
                type: 'value',
                axisLabel: { fontSize: 14 }
            },
            series: [{
                data: dailyWords.map(d => d.words),
                type: 'bar',
                itemStyle: {
                    color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                        { offset: 0, color: '#FF6B6B' },
                        { offset: 1, color: '#4ECDC4' }
                    ])
                }
            }],
            grid: { left: '10%', right: '5%', bottom: '20%', top: '10%' },
            dataZoom: [
                { type: 'inside', start: 0, end: 100 }
            ]
        });
    }

    // 窗口大小变化时调整图表
    window.addEventListener('resize', function() {
        if (dailyChart) dailyChart.resize();
        if (weeklyTrendChart) weeklyTrendChart.resize();
        if (monthlyChart) monthlyChart.resize();
    });
</script>
</body>
</html>
