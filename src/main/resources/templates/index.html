<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{layout :: head('听写小助手 - 首页')}"></head>
<body>
<!-- 导航栏 -->
<nav th:replace="~{layout :: navbar('index')}"></nav>

<div class="main-container">
    <!-- 进度条 -->
    <div class="progress mb-4" id="progressContainer" style="display: none;">
        <div class="progress-bar" id="progressBar" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
    </div>

    <!-- 主要内容区域 -->
    <div class="row">
        <!-- 左侧：听写任务选择 -->
        <div class="col-lg-5 mb-4">
            <div class="card h-100">
                <div class="card-header">
                    <i class="bi bi-list-check me-2"></i>听写任务选择
                </div>
                <div class="card-body">
                    <!-- 选择已有听写任务 -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">选择听写任务：</label>
                        <div class="d-flex gap-2">
                            <select class="form-select" id="taskSelect" onchange="loadTask()">
                                <option value="">-- 请选择听写任务 --</option>
                            </select>
                            <button class="btn btn-outline-secondary btn-sm" onclick="refreshTasks()" title="刷新任务列表">
                                <i class="bi bi-arrow-repeat"></i>
                            </button>
                        </div>
                        <small class="text-muted">提示：选择未完成的任务开始听写，已完成任务可在历史记录查看</small>
                    </div>

                    <!-- 显示选中任务的词语 -->
                    <div class="mb-3" id="selectedTaskWords" style="display: none;">
                        <label class="form-label fw-bold">任务词语列表：</label>
                        <div class="word-list-container" id="wordListContainer">
                            <!-- 词语列表将在这里动态生成 -->
                        </div>
                    </div>

                    <!-- 任务名称显示 -->
                    <div class="mb-3" id="selectedTaskName" style="display: none;">
                        <label class="form-label fw-bold">任务名称：</label>
                        <input type="text" class="form-control" id="batchName" readonly>
                    </div>

                    <!-- 进度信息 -->
                    <div class="mb-3" id="progressInfo" style="display: none;">
                        <div class="row">
                            <div class="col-4 text-center">
                                <span class="badge bg-success">正确: <span id="savedCorrectCount">0</span></span>
                            </div>
                            <div class="col-4 text-center">
                                <span class="badge bg-danger">错误: <span id="savedWrongCount">0</span></span>
                            </div>
                            <div class="col-4 text-center">
                                <span class="badge bg-secondary">进度: <span id="savedProgress">0</span>/<span id="savedTotal">0</span></span>
                            </div>
                        </div>
                    </div>

                    <!-- 听写人选择 -->
                    <div class="mb-3" id="dictatorSection">
                        <label class="form-label fw-bold">听写人：</label>
                        <div class="d-flex gap-2">
                            <input type="text" class="form-control" id="dictatorInput" value="凡凡" placeholder="输入听写人姓名">
                            <button class="btn btn-outline-secondary btn-sm" onclick="showDictatorManager()" title="管理听写人">
                                <i class="bi bi-people"></i>
                            </button>
                        </div>
                    </div>

                    <!-- 开始听写按钮 -->
                    <div class="d-grid gap-2 mb-4" id="startDictationSection" style="display: none;">
                        <button class="btn btn-primary btn-action" id="startBtn" onclick="startDictation()">
                            <i class="bi bi-play-circle me-2"></i>开始听写
                        </button>
                        <button class="btn btn-outline-warning btn-action" id="continueBtn" onclick="continueDictation()" style="display: none;">
                            <i class="bi bi-arrow-repeat me-2"></i>继续听写
                        </button>
                        <button class="btn btn-outline-secondary btn-action" id="resetProgressBtn" onclick="resetTaskProgress()" style="display: none;">
                            <i class="bi bi-refresh me-2"></i>重新开始
                        </button>
                    </div>

                    <!-- 管理任务链接 -->
                    <div class="text-center mt-4">
                        <a href="/tasks" class="btn btn-outline-info">
                            <i class="bi bi-gear me-2"></i>管理听写任务
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧：听写区域 -->
        <div class="col-lg-7 mb-4">
            <div class="card h-100">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span><i class="bi bi-megaphone me-2"></i>听写区域</span>
                    <button class="btn btn-sm btn-outline-light" onclick="showSettingsModal()" title="朗读设置">
                        <i class="bi bi-gear-fill"></i>
                    </button>
                </div>
                <div class="card-body d-flex flex-column">
                    <!-- 词语显示区 -->
                    <div class="word-display mb-4" id="wordDisplay">
                        <span class="text-muted">请先选择听写任务</span>
                    </div>

                    <!-- 当前状态 -->
                    <div class="text-center mb-3" id="statusArea" style="display: none;">
                        <h5>
                            第 <span class="text-primary fw-bold" id="currentIndex">0</span> /
                            <span class="text-secondary" id="totalWords">0</span> 个词语
                        </h5>
                    </div>

                    <!-- 控制按钮 -->
                    <div class="d-flex justify-content-center flex-wrap mb-3" id="controlButtons" style="display: none;">
                        <button class="btn btn-info btn-action" onclick="previousWord()" id="prevBtn">
                            <i class="bi bi-arrow-left-circle me-2"></i>上一个 <small class="text-muted">(←)</small>
                        </button>
                        <button class="btn btn-warning btn-action" onclick="readAgain()">
                            <i class="bi bi-volume-up me-2"></i>再次朗读 <small class="text-muted">(↑)</small>
                        </button>
                        <button class="btn btn-info btn-action" onclick="nextWord()" id="nextBtn">
                            <i class="bi bi-arrow-right-circle me-2"></i>下一个 <small class="text-muted">(→)</small>
                        </button>
                    </div>

                    <!-- 答案显示 -->
                    <div class="text-center" id="answerArea" style="display: none;">
                        <button class="btn btn-outline-primary btn-action" id="answerBtn" onclick="toggleAnswer()">
                            <i class="bi bi-eye me-2"></i>显示答案 <small class="text-muted">(↓)</small>
                        </button>
                    </div>

                    <!-- 结果按钮 -->
                    <div class="d-flex justify-content-center mt-3" id="resultButtons" style="display: none;">
                        <button class="btn btn-success btn-action me-3" onclick="markCorrect()">
                            <i class="bi bi-check-circle me-2"></i>正确
                        </button>
                        <button class="btn btn-danger btn-action" onclick="markWrong()">
                            <i class="bi bi-x-circle me-2"></i>错误
                        </button>
                    </div>

                    <!-- 完成提示 -->
                    <div class="text-center mt-4" id="completeArea" style="display: none;">
                        <div class="alert alert-success fs-4" role="alert">
                            <i class="bi bi-trophy-fill me-2"></i>恭喜完成听写！
                        </div>
                        <div class="row mt-3">
                            <div class="col-6">
                                <div class="stat-card">
                                    <div class="stat-number text-success" id="correctCount">0</div>
                                    <div class="stat-label">正确数</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="stat-card">
                                    <div class="stat-number text-danger" id="wrongCount">0</div>
                                    <div class="stat-label">错误数</div>
                                </div>
                            </div>
                        </div>
                        <button class="btn btn-primary btn-action mt-3" onclick="reviewWrong()">
                            <i class="bi bi-arrow-repeat me-2"></i>复习错误词语
                        </button>
                        <button class="btn btn-secondary btn-action mt-3" onclick="location.reload()">
                            <i class="bi bi-plus-circle me-2"></i>开始新的听写
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 错误词语列表 -->
    <div class="row" id="wrongWordsSection" style="display: none;">
        <div class="col-12">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <i class="bi bi-exclamation-triangle me-2"></i>错误词语（已自动加入生词本）
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>词语</th>
                                    <th>错误次数</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="wrongWordsList">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 朗读设置弹窗 -->
<div class="modal fade" id="settingsModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">
                    <i class="bi bi-gear-fill me-2"></i>朗读设置
                </h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <!-- 语速设置 -->
                <div class="mb-4">
                    <label class="form-label fw-bold">语速：</label>
                    <input type="range" class="form-range" id="speechRate" min="0.5" max="1.5" step="0.1" value="0.8">
                    <div class="d-flex justify-content-between">
                        <small class="text-muted">慢</small>
                        <small class="fw-bold" id="rateValue">0.8</small>
                        <small class="text-muted">快</small>
                    </div>
                </div>

                <!-- 音量设置 -->
                <div class="mb-4">
                    <label class="form-label fw-bold">音量：</label>
                    <input type="range" class="form-range" id="speechVolume" min="0" max="1" step="0.1" value="1">
                    <div class="d-flex justify-content-between">
                        <small class="text-muted">低</small>
                        <small class="fw-bold" id="volumeValue">100%</small>
                        <small class="text-muted">高</small>
                    </div>
                </div>

                <!-- 音色设置 -->
                <div class="mb-4">
                    <label class="form-label fw-bold">音色：</label>
                    <select class="form-select" id="speechVoice">
                        <option value="">默认音色</option>
                    </select>
                    <small class="text-muted">选择不同的朗读声音（取决于系统支持）</small>
                </div>

                <!-- 测试朗读 -->
                <div class="text-center">
                    <button class="btn btn-outline-primary" onclick="testSpeech()">
                        <i class="bi bi-volume-up me-2"></i>测试朗读
                    </button>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
                <button type="button" class="btn btn-primary" onclick="saveSettings()">保存设置</button>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<footer th:replace="~{layout :: footer}"></footer>

<!-- 脚本 -->
<div th:replace="~{layout :: scripts}"></div>

<script>
    // 全局变量
    let words = [];
    let currentIndex = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let wrongWords = [];
    let isDictating = false;
    let batchId = null;
    let selectedTaskId = null;

    // 语音合成
    const synth = window.speechSynthesis;
    let currentUtterance = null;

    // 开始听写
    function startDictation() {
        if (!selectedTaskId) {
            showToast('请先选择一个已保存的听写任务！', 'warning');
            return;
        }

        if (words.length === 0) {
            showToast('任务词语为空！', 'warning');
            return;
        }

        // 获取听写人
        const dictator = document.getElementById('dictatorInput').value.trim() || '凡凡';

        // 重置状态
        currentIndex = 0;
        correctCount = 0;
        wrongCount = 0;
        wrongWords = [];
        isDictating = true;

        // 更新统计
        updateStats();

        // 显示听写区域
        document.getElementById('progressContainer').style.display = 'block';
        document.getElementById('statusArea').style.display = 'block';
        document.getElementById('controlButtons').style.display = 'flex';
        document.getElementById('answerArea').style.display = 'block';
        document.getElementById('resultButtons').style.display = 'flex';
        document.getElementById('completeArea').style.display = 'none';
        document.getElementById('wrongWordsSection').style.display = 'none';
        document.getElementById('startBtn').disabled = true;

        // 高亮第一个词语
        highlightCurrentWord(0);

        // 开始第一个词语
        showCurrentWord();

        // 通过API开始听写（更新任务状态为进行中，保存听写人）
        startDictationFromTask(selectedTaskId, dictator);
    }

    // 继续听写（从上次进度继续）
    function continueDictation() {
        if (!selectedTaskId) {
            showToast('请先选择任务', 'warning');
            return;
        }

        isDictating = true;

        // 获取保存的进度
        fetch(`/api/tasks/${selectedTaskId}`).then(response => response.json())
            .then(result => {
                if (result.success && result.data) {
                    const task = result.data;
                    currentIndex = task.currentIndex || 0;
                    correctCount = task.correctCount || 0;
                    wrongCount = task.wrongCount || 0;

                    // 显示听写区域
                    document.getElementById('progressContainer').style.display = 'block';
                    document.getElementById('statusArea').style.display = 'block';
                    document.getElementById('controlButtons').style.display = 'flex';
                    document.getElementById('answerArea').style.display = 'block';
                    document.getElementById('resultButtons').style.display = 'flex';
                    document.getElementById('completeArea').style.display = 'none';
                    document.getElementById('startBtn').disabled = true;

                    // 高亮当前词语
                    highlightCurrentWord(currentIndex);

                    updateStats();
                    showCurrentWord();

                    showToast(`继续听写，从第${currentIndex + 1}个词语开始`, 'success');
                }
            });
    }

    // 重置任务进度
    async function resetTaskProgress() {
        if (!selectedTaskId) return;

        if (!confirm('确定要重新开始吗？之前的进度将被清除。')) {
            return;
        }

        try {
            const response = await fetch(`/api/tasks/${selectedTaskId}/reset-progress`, {
                method: 'POST'
            });
            const result = await response.json();

            if (result.success) {
                showToast('进度已重置', 'success');
                loadTask();  // 重新加载任务信息
            } else {
                showToast(result.message || '重置失败', 'warning');
            }
        } catch (error) {
            console.error('重置进度失败:', error);
            showToast('操作失败', 'warning');
        }
    }

    // 从任务开始听写（调用API）
    async function startDictationFromTask(taskId, dictator) {
        try {
            // 先保存听写人
            await fetch(`/api/tasks/${taskId}/dictator?dictator=${encodeURIComponent(dictator)}`, {
                method: 'POST'
            });

            // 开始听写
            const response = await fetch(`/api/tasks/${taskId}/dictation`, {
                method: 'POST'
            });
            const result = await response.json();
            if (result.success) {
                batchId = result.data;
            } else {
                showToast(result.message || '启动失败', 'warning');
            }
        } catch (error) {
            console.error('启动听写失败:', error);
        }
    }

    // 更新统计信息
    function updateStats() {
        document.getElementById('totalWords').textContent = words.length;

        // 更新进度条（使用 currentIndex，点击下一个时也会更新）
        const progress = words.length > 0 ? (currentIndex / words.length * 100) : 0;
        const progressBar = document.getElementById('progressBar');
        progressBar.style.width = progress + '%';
        progressBar.textContent = Math.round(progress) + '%';
    }

    // 显示当前词语
    function showCurrentWord() {
        if (currentIndex >= words.length) {
            finishDictation();
            return;
        }

        const word = words[currentIndex];
        document.getElementById('currentIndex').textContent = currentIndex + 1;
        document.getElementById('wordDisplay').innerHTML = '<i class="bi bi-volume-up-fill text-primary" style="font-size: 3rem;"></i>';

        // 高亮当前词语
        highlightCurrentWord(currentIndex);

        // 重置答案按钮为"显示答案"状态
        const answerBtn = document.getElementById('answerBtn');
        answerBtn.innerHTML = '<i class="bi bi-eye me-2"></i>显示答案';
        answerBtn.className = 'btn btn-outline-primary btn-action';

        // 检查是否是最后一个词语，改变"下一个"按钮
        const nextBtn = document.getElementById('nextBtn');
        if (currentIndex === words.length - 1) {
            nextBtn.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i>完成听写';
            nextBtn.className = 'btn btn-success btn-action';
            nextBtn.onclick = finishDictation;
        } else {
            nextBtn.innerHTML = '<i class="bi bi-arrow-right-circle me-2"></i>下一个';
            nextBtn.className = 'btn btn-info btn-action';
            nextBtn.onclick = nextWord;
        }

        // 开始听写词语（记录开始时间）
        if (selectedTaskId) {
            startWordRecord(selectedTaskId, word);
        }

        // 自动朗读
        readWord(word);
    }

    // 开始听写词语（调用API）
    async function startWordRecord(taskId, word) {
        try {
            await fetch(`/api/tasks/${taskId}/start-word?word=${encodeURIComponent(word)}`, {
                method: 'POST'
            });
        } catch (error) {
            console.error('开始听写词语失败:', error);
        }
    }

    // 朗读词语
    function readWord(word) {
        if (synth.speaking) {
            synth.cancel();
        }
        currentUtterance = new SpeechSynthesisUtterance(word);
        currentUtterance.lang = 'zh-CN';
        currentUtterance.rate = speechRate;
        currentUtterance.pitch = 1;
        currentUtterance.volume = speechVolume;

        const voices = synth.getVoices();
        if (selectedVoice && voices[selectedVoice]) {
            currentUtterance.voice = voices[selectedVoice];
        }

        synth.speak(currentUtterance);
    }

    // 再次朗读（增加朗读次数）
    function readAgain() {
        if (currentIndex < words.length) {
            const word = words[currentIndex];
            readWord(word);

            // 增加朗读次数
            if (selectedTaskId) {
                incrementReadCount(selectedTaskId, word);
            }
        }
    }

    // 增加朗读次数（调用API）
    async function incrementReadCount(taskId, word) {
        try {
            await fetch(`/api/tasks/${taskId}/read-word?word=${encodeURIComponent(word)}`, {
                method: 'POST'
            });
        } catch (error) {
            console.error('增加朗读次数失败:', error);
        }
    }

    // 上一个词语
    function previousWord() {
        if (currentIndex > 0) {
            currentIndex--;
            updateStats();
            showCurrentWord();
        }
    }

    // 下一个词语（默认正确，与markCorrect相同）
    function nextWord() {
        if (currentIndex < words.length) {
            const word = words[currentIndex];
            // 完成当前词语听写（默认正确）
            if (selectedTaskId) {
                completeWordRecord(selectedTaskId, word, true);
            }
            currentIndex++;
            correctCount++;

            if (currentIndex >= words.length) {
                finishDictation();
            } else {
                updateStats();
                showCurrentWord();
            }
        }
    }

    // 完成词语听写（调用API）
    async function completeWordRecord(taskId, word, isCorrect) {
        try {
            await fetch(`/api/tasks/${taskId}/complete-word?word=${encodeURIComponent(word)}&isCorrect=${isCorrect}`, {
                method: 'POST'
            });
        } catch (error) {
            console.error('完成词语听写失败:', error);
        }
    }

    // 显示/隐藏答案
    function toggleAnswer() {
        const word = words[currentIndex];
        const answerBtn = document.getElementById('answerBtn');
        const wordDisplay = document.getElementById('wordDisplay');

        if (answerBtn.innerHTML.includes('显示答案')) {
            // 显示答案
            wordDisplay.innerHTML = `<i class="bi bi-volume-up-fill text-primary" style="font-size: 3rem;"></i><span class="ms-3 badge bg-success fs-3 px-4 py-2">${word}</span>`;
            answerBtn.innerHTML = '<i class="bi bi-eye-slash me-2"></i>隐藏答案';
            answerBtn.className = 'btn btn-outline-secondary btn-action';
        } else {
            // 隐藏答案
            wordDisplay.innerHTML = '<i class="bi bi-volume-up-fill text-primary" style="font-size: 3rem;"></i>';
            answerBtn.innerHTML = '<i class="bi bi-eye me-2"></i>显示答案';
            answerBtn.className = 'btn btn-outline-primary btn-action';
        }
    }

    // 标记正确（与下一个按钮功能相同）
    function markCorrect() {
        nextWord();
    }

    // 标记错误
    function markWrong() {
        const word = words[currentIndex];
        wrongCount++;

        // 添加到错误列表
        const existingWord = wrongWords.find(w => w.word === word);
        if (existingWord) {
            existingWord.count++;
        } else {
            wrongWords.push({ word: word, count: 1 });
        }

        // 完成词语听写（错误）
        if (selectedTaskId) {
            completeWordRecord(selectedTaskId, word, false);
        }

        currentIndex++;

        if (currentIndex >= words.length) {
            finishDictation();
        } else {
            updateStats();
            showCurrentWord();
        }
    }

    // 完成听写
    function finishDictation() {
        isDictating = false;

        // 完成最后一个词语的听写记录（如果还未完成）
        if (currentIndex < words.length && selectedTaskId) {
            const lastWord = words[currentIndex];
            completeWordRecord(selectedTaskId, lastWord, true);
            correctCount++;
        }

        // 设置进度条为100%
        const progressBar = document.getElementById('progressBar');
        progressBar.style.width = '100%';
        progressBar.textContent = '100%';

        // 显示完成区域
        document.getElementById('controlButtons').style.display = 'none';
        document.getElementById('answerArea').style.display = 'none';
        document.getElementById('resultButtons').style.display = 'none';
        document.getElementById('completeArea').style.display = 'block';
        document.getElementById('correctCount').textContent = correctCount;
        document.getElementById('wrongCount').textContent = wrongCount;
        document.getElementById('wordDisplay').innerHTML = '<i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>';

        // 如果是从已保存任务开始的，自动标记任务为已完成
        if (selectedTaskId) {
            completeTask();
        }

        // 显示错误词语
        if (wrongWords.length > 0) {
            document.getElementById('wrongWordsSection').style.display = 'block';
            const tbody = document.getElementById('wrongWordsList');
            tbody.innerHTML = '';
            wrongWords.forEach(w => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${w.word}</strong></td>
                        <td><span class="badge bg-danger">${w.count}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="readWord('${w.word}')">
                                <i class="bi bi-volume-up"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            // 保存错误词语到生词本
            saveWrongWords();
        }

        // 更新批次状态
        updateBatchStatus();
    }

    // 标记任务已完成
    async function completeTask() {
        if (!selectedTaskId) {
            return;
        }

        try {
            const response = await fetch(`/api/tasks/${selectedTaskId}/complete`, {
                method: 'POST'
            });

            const result = await response.json();

            if (result.success) {
                showToast('听写已完成，任务已保存！', 'success');
            } else {
                showToast(result.message || '保存任务状态失败', 'warning');
            }
        } catch (error) {
            console.error('完成任务失败:', error);
            showToast('保存任务状态失败', 'warning');
        }
    }

    // 复习错误词语
    function reviewWrong() {
        if (wrongWords.length === 0) {
            showToast('没有需要复习的词语！', 'info');
            return;
        }

        // 用错误词语重新开始听写
        words = wrongWords.map(w => w.word);
        wrongWords = [];
        currentIndex = 0;
        correctCount = 0;
        wrongCount = 0;

        document.getElementById('completeArea').style.display = 'none';
        document.getElementById('wrongWordsSection').style.display = 'none';
        document.getElementById('controlButtons').style.display = 'flex';
        document.getElementById('answerArea').style.display = 'block';
        document.getElementById('resultButtons').style.display = 'flex';

        updateStats();
        showCurrentWord();
    }

    // 清空重来
    function clearAll() {
        document.getElementById('batchName').value = '';
        document.getElementById('progressContainer').style.display = 'none';
        document.getElementById('statusArea').style.display = 'none';
        document.getElementById('controlButtons').style.display = 'none';
        document.getElementById('answerArea').style.display = 'none';
        document.getElementById('resultButtons').style.display = 'none';
        document.getElementById('completeArea').style.display = 'none';
        document.getElementById('wrongWordsSection').style.display = 'none';
        document.getElementById('startBtn').disabled = false;
        document.getElementById('wordDisplay').innerHTML = '<span class="text-muted">请先选择听写任务</span>';

        words = [];
        currentIndex = 0;
        correctCount = 0;
        wrongCount = 0;
        wrongWords = [];
        isDictating = false;
    }

    // 保存批次到后端
    async function saveBatch() {
        const batchName = document.getElementById('batchName').value || `听写_${new Date().toLocaleDateString()}`;
        try {
            const response = await fetch('/api/batches', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: batchName,
                    wordCount: words.length,
                    words: words
                })
            });
            if (response.ok) {
                const data = await response.json();
                batchId = data.id;
            }
        } catch (error) {
            console.error('保存批次失败:', error);
        }
    }

    // 更新批次状态
    async function updateBatchStatus() {
        if (!batchId) return;
        try {
            await fetch(`/api/batches/${batchId}/complete`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    correctCount: correctCount,
                    wrongCount: wrongCount
                })
            });
        } catch (error) {
            console.error('更新批次状态失败:', error);
        }
    }

    // 保存错误词语到生词本
    async function saveWrongWords() {
        try {
            await fetch('/api/difficult-words/batch', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(wrongWords.map(w => ({
                    word: w.word,
                    masteryLevel: 1
                })))
            });
        } catch (error) {
            console.error('保存生词失败:', error);
        }
    }

    // 显示提示
    function showToast(message, type = 'info') {
        const toastHtml = `
            <div class="toast align-items-center text-white bg-${type === 'warning' ? 'warning' : 'primary'} border-0" role="alert">
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
        `;
        const container = document.createElement('div');
        container.className = 'toast-container position-fixed top-0 end-0 p-3';
        container.innerHTML = toastHtml;
        document.body.appendChild(container);
        const toast = new bootstrap.Toast(container.querySelector('.toast'));
        toast.show();
        setTimeout(() => container.remove(), 5000);
    }

    // 刷新听写任务列表（只加载未完成的任务）
    async function refreshTasks() {
        try {
            const response = await fetch('/api/tasks/uncompleted');
            const result = await response.json();

            if (result.success && result.data) {
                const select = document.getElementById('taskSelect');
                select.innerHTML = '<option value="">-- 请选择听写任务 --</option>';

                // 按状态分组，进行中在前，未开始在后
                const inProgressTasks = result.data.filter(t => t.status === 'IN_PROGRESS');
                const notStartedTasks = result.data.filter(t => t.status === 'NOT_STARTED');

                // 进行中任务（排在前面）
                if (inProgressTasks.length > 0) {
                    const group = document.createElement('optgroup');
                    group.label = '进行中';
                    inProgressTasks.forEach(task => {
                        const option = document.createElement('option');
                        option.value = task.id;
                        option.textContent = `${task.taskName} (进度${task.currentIndex}/${task.wordCount})`;
                        group.appendChild(option);
                    });
                    select.appendChild(group);
                }

                // 未开始任务（排在后面）
                if (notStartedTasks.length > 0) {
                    const group = document.createElement('optgroup');
                    group.label = '未开始';
                    notStartedTasks.forEach(task => {
                        const option = document.createElement('option');
                        option.value = task.id;
                        option.textContent = `${task.taskName} (${task.wordCount}个词)`;
                        group.appendChild(option);
                    });
                    select.appendChild(group);
                }

                if (inProgressTasks.length === 0 && notStartedTasks.length === 0) {
                    select.innerHTML = '<option value="">-- 暂无未完成任务 --</option>';
                }
            } else {
                showToast('加载任务失败: ' + (result.message || '未知错误'), 'warning');
            }
        } catch (error) {
            console.error('加载听写任务失败:', error);
            showToast('加载失败，请检查网络', 'warning');
        }
    }

    // 加载选中的听写任务
    async function loadTask() {
        const taskId = document.getElementById('taskSelect').value;
        if (!taskId) {
            // 清除选中状态
            selectedTaskId = null;
            document.getElementById('selectedTaskWords').style.display = 'none';
            document.getElementById('selectedTaskName').style.display = 'none';
            document.getElementById('progressInfo').style.display = 'none';
            document.getElementById('startDictationSection').style.display = 'none';
            return;
        }

        selectedTaskId = taskId;

        try {
            const response = await fetch(`/api/tasks/${taskId}`);
            const result = await response.json();

            if (result.success && result.data) {
                const task = result.data;
                // 存储词语列表供后续使用
                words = task.words;

                document.getElementById('batchName').value = task.taskName;

                // 显示词语列表
                renderWordList(task.words);

                // 显示任务详情区域
                document.getElementById('selectedTaskWords').style.display = 'block';
                document.getElementById('selectedTaskName').style.display = 'block';

                // 设置听写人（如果有保存的话，否则默认为凡凡）
                document.getElementById('dictatorInput').value = task.dictator || '凡凡';

                // 根据任务状态显示不同的按钮和提示
                if (task.status === 'IN_PROGRESS' || task.currentIndex > 0) {
                    // 进行中任务
                    document.getElementById('progressInfo').style.display = 'block';
                    document.getElementById('savedCorrectCount').textContent = task.correctCount || 0;
                    document.getElementById('savedWrongCount').textContent = task.wrongCount || 0;
                    document.getElementById('savedProgress').textContent = task.currentIndex || 0;
                    document.getElementById('savedTotal').textContent = task.wordCount;

                    // 显示继续/重新开始按钮
                    document.getElementById('startBtn').style.display = 'inline-block';
                    document.getElementById('continueBtn').style.display = 'inline-block';
                    document.getElementById('resetProgressBtn').style.display = 'inline-block';
                    document.getElementById('startDictationSection').style.display = 'grid';

                    showToast(`已加载：${task.taskName}（进行中）`, 'success');
                } else {
                    // 未开始任务
                    document.getElementById('progressInfo').style.display = 'none';
                    document.getElementById('startBtn').style.display = 'inline-block';
                    document.getElementById('continueBtn').style.display = 'none';
                    document.getElementById('resetProgressBtn').style.display = 'none';
                    document.getElementById('startDictationSection').style.display = 'grid';

                    showToast(`已加载：${task.taskName}（未开始）`, 'success');
                }
            } else {
                showToast('加载任务失败: ' + (result.message || '未知错误'), 'warning');
                selectedTaskId = null;
            }
        } catch (error) {
            console.error('加载听写任务失败:', error);
            showToast('加载失败，请检查网络', 'warning');
            selectedTaskId = null;
        }
    }

    // 渲染词语列表
    function renderWordList(words) {
        const container = document.getElementById('wordListContainer');
        container.innerHTML = '';

        words.forEach((word, index) => {
            const span = document.createElement('span');
            span.className = 'badge bg-light text-dark word-badge';
            span.textContent = word;
            span.id = `word-${index}`;
            span.style.margin = '2px';
            container.appendChild(span);
        });
    }

    // 高亮当前词语
    function highlightCurrentWord(index) {
        // 移除所有高亮
        document.querySelectorAll('.word-badge').forEach(badge => {
            badge.className = 'badge bg-light text-dark word-badge';
        });

        // 高亮当前词语
        const currentBadge = document.getElementById(`word-${index}`);
        if (currentBadge) {
            currentBadge.className = 'badge bg-primary word-badge';
        }
    }

    // 显示听写人管理页面
    function showDictatorManager() {
        window.location.href = '/dictators';
    }

    // 朗读设置相关
    let speechRate = 0.8;
    let speechVolume = 1;
    let selectedVoice = '';

    // 页面加载时初始化设置
    document.addEventListener('DOMContentLoaded', function() {
        // 加载保存的设置
        loadSettings();
        // 加载听写任务列表
        refreshTasks();
        // 加载可用音色
        loadVoices();
        // 绑定键盘快捷键
        bindKeyboardShortcuts();
    });

    // 绑定键盘快捷键
    function bindKeyboardShortcuts() {
        document.addEventListener('keydown', function(e) {
            // 只有在听写进行中才响应快捷键
            if (!isDictating) return;

            // 阻止默认行为
            if (e.key === 'ArrowLeft' || e.key === 'ArrowRight' || e.key === 'ArrowUp' || e.key === 'ArrowDown') {
                e.preventDefault();
            }

            switch (e.key) {
                case 'ArrowLeft':
                    // 上一个词语
                    previousWord();
                    break;
                case 'ArrowRight':
                    // 下一个词语（最后一个词语时为完成听写）
                    if (currentIndex === words.length - 1) {
                        finishDictation();
                    } else {
                        nextWord();
                    }
                    break;
                case 'ArrowUp':
                    // 再次朗读
                    readAgain();
                    break;
                case 'ArrowDown':
                    // 显示/隐藏答案
                    toggleAnswer();
                    break;
            }
        });
    }

    // 加载可用音色
    function loadVoices() {
        const voiceSelect = document.getElementById('speechVoice');

        // 等待语音合成加载完成
        if (speechSynthesis.onvoiceschanged !== undefined) {
            speechSynthesis.onvoiceschanged = function() {
                const voices = speechSynthesis.getVoices();
                voiceSelect.innerHTML = '<option value="">默认音色</option>';

                // 只显示中文音色
                voices.forEach((voice, index) => {
                    if (voice.lang.includes('zh') || voice.lang.includes('CN')) {
                        const option = document.createElement('option');
                        option.value = index;
                        option.textContent = voice.name + ' (' + voice.lang + ')';
                        voiceSelect.appendChild(option);
                    }
                });
            };
        }
    }

    // 加载保存的设置
    function loadSettings() {
        const savedRate = localStorage.getItem('speechRate');
        const savedVolume = localStorage.getItem('speechVolume');
        const savedVoice = localStorage.getItem('speechVoice');

        if (savedRate) {
            speechRate = parseFloat(savedRate);
            document.getElementById('speechRate').value = speechRate;
            document.getElementById('rateValue').textContent = speechRate;
        }

        if (savedVolume) {
            speechVolume = parseFloat(savedVolume);
            document.getElementById('speechVolume').value = speechVolume;
            document.getElementById('volumeValue').textContent = Math.round(speechVolume * 100) + '%';
        }

        if (savedVoice) {
            selectedVoice = savedVoice;
            document.getElementById('speechVoice').value = selectedVoice;
        }
    }

    // 显示设置弹窗
    function showSettingsModal() {
        // 加载音色列表
        loadVoices();
        // 更新当前值显示
        document.getElementById('rateValue').textContent = speechRate;
        document.getElementById('volumeValue').textContent = Math.round(speechVolume * 100) + '%';

        const modal = new bootstrap.Modal(document.getElementById('settingsModal'));
        modal.show();
    }

    // 保存设置
    function saveSettings() {
        speechRate = parseFloat(document.getElementById('speechRate').value);
        speechVolume = parseFloat(document.getElementById('speechVolume').value);
        selectedVoice = document.getElementById('speechVoice').value;

        localStorage.setItem('speechRate', speechRate);
        localStorage.setItem('speechVolume', speechVolume);
        localStorage.setItem('speechVoice', selectedVoice);

        showToast('设置已保存', 'success');

        bootstrap.Modal.getInstance(document.getElementById('settingsModal')).hide();
    }

    // 测试朗读
    function testSpeech() {
        const testText = '听写测试';
        const utterance = new SpeechSynthesisUtterance(testText);
        utterance.lang = 'zh-CN';
        utterance.rate = parseFloat(document.getElementById('speechRate').value);
        utterance.volume = parseFloat(document.getElementById('speechVolume').value);

        const voices = speechSynthesis.getVoices();
        const voiceIndex = document.getElementById('speechVoice').value;
        if (voiceIndex && voices[voiceIndex]) {
            utterance.voice = voices[voiceIndex];
        }

        speechSynthesis.cancel();
        speechSynthesis.speak(utterance);
    }
</script>
</body>
