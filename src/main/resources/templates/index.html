<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="~{layout :: head('听写小助手 - 首页')}"></head>
<body>
<!-- 导航栏 -->
<nav th:replace="~{layout :: navbar('index')}"></nav>

<div class="main-container">
    <!-- 统计面板 -->
    <div class="row mb-2">
        <div class="col-md-4">
            <div class="stat-card stat-card-sm">
                <div class="stat-number stat-number-sm" id="totalCount">0</div>
                <div class="stat-label stat-label-sm">总词语数</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card stat-card-sm">
                <div class="stat-number stat-number-sm" id="completedCount">0</div>
                <div class="stat-label stat-label-sm">已听写</div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="stat-card stat-card-sm">
                <div class="stat-number stat-number-sm" id="remainingCount">0</div>
                <div class="stat-label stat-label-sm">剩余数</div>
            </div>
        </div>
    </div>

    <!-- 进度条 -->
    <div class="progress mb-4" id="progressContainer" style="display: none;">
        <div class="progress-bar" id="progressBar" role="progressbar" style="width: 0%" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">0%</div>
    </div>

    <!-- 主要内容区域 -->
    <div class="row">
        <!-- 左侧：听写任务选择 -->
        <div class="col-lg-5 mb-4">
            <div class="card h-100">
                <div class="card-header">
                    <i class="bi bi-list-check me-2"></i>听写任务选择
                </div>
                <div class="card-body">
                    <!-- 选择已有听写任务 -->
                    <div class="mb-3">
                        <label class="form-label fw-bold">选择未完成的听写任务：</label>
                        <div class="d-flex gap-2">
                            <select class="form-select" id="taskSelect" onchange="loadTask()">
                                <option value="">-- 请选择听写任务 --</option>
                            </select>
                            <button class="btn btn-outline-secondary btn-sm" onclick="refreshTasks()" title="刷新任务列表">
                                <i class="bi bi-arrow-repeat"></i>
                            </button>
                        </div>
                        <small class="text-muted">提示：只有选择已保存的未完成任务才能开始听写</small>
                    </div>

                    <!-- 显示选中任务的词语 -->
                    <div class="mb-3" id="selectedTaskWords" style="display: none;">
                        <label class="form-label fw-bold">任务词语：</label>
                        <textarea class="form-control" id="wordInput" rows="8" readonly placeholder="选择任务后显示词语"></textarea>
                    </div>

                    <!-- 任务名称显示 -->
                    <div class="mb-3" id="selectedTaskName" style="display: none;">
                        <label class="form-label fw-bold">任务名称：</label>
                        <input type="text" class="form-control" id="batchName" readonly>
                    </div>

                    <!-- 开始听写按钮 -->
                    <div class="d-grid gap-2 mb-4" id="startDictationSection" style="display: none;">
                        <button class="btn btn-primary btn-action" id="startBtn" onclick="startDictation()">
                            <i class="bi bi-play-circle me-2"></i>开始听写
                        </button>
                    </div>

                    <!-- 管理任务链接 -->
                    <div class="text-center mt-4">
                        <a href="/tasks" class="btn btn-outline-info">
                            <i class="bi bi-gear me-2"></i>管理听写任务
                        </a>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧：听写区域 -->
        <div class="col-lg-7 mb-4">
            <div class="card h-100">
                <div class="card-header">
                    <i class="bi bi-megaphone me-2"></i>听写区域
                </div>
                <div class="card-body d-flex flex-column">
                    <!-- 词语显示区 -->
                    <div class="word-display mb-4" id="wordDisplay">
                        <span class="text-muted">请先录入词语并点击"开始听写"</span>
                    </div>

                    <!-- 当前状态 -->
                    <div class="text-center mb-3" id="statusArea" style="display: none;">
                        <h5>
                            第 <span class="text-primary fw-bold" id="currentIndex">0</span> /
                            <span class="text-secondary" id="totalWords">0</span> 个词语
                        </h5>
                    </div>

                    <!-- 控制按钮 -->
                    <div class="d-flex justify-content-center flex-wrap mb-3" id="controlButtons" style="display: none;">
                        <button class="btn btn-info btn-action" onclick="previousWord()" id="prevBtn">
                            <i class="bi bi-arrow-left-circle me-2"></i>上一个
                        </button>
                        <button class="btn btn-warning btn-action" onclick="readAgain()">
                            <i class="bi bi-volume-up me-2"></i>再次朗读
                        </button>
                        <button class="btn btn-info btn-action" onclick="nextWord()" id="nextBtn">
                            <i class="bi bi-arrow-right-circle me-2"></i>下一个
                        </button>
                    </div>

                    <!-- 答案显示 -->
                    <div class="text-center" id="answerArea" style="display: none;">
                        <button class="btn btn-outline-primary btn-action" onclick="showAnswer()">
                            <i class="bi bi-eye me-2"></i>显示答案
                        </button>
                        <div class="mt-3" id="answerText" style="display: none;">
                            <span class="badge bg-success fs-4 px-4 py-2" id="correctWord"></span>
                        </div>
                    </div>

                    <!-- 结果按钮 -->
                    <div class="d-flex justify-content-center mt-3" id="resultButtons" style="display: none;">
                        <button class="btn btn-success btn-action me-3" onclick="markCorrect()">
                            <i class="bi bi-check-circle me-2"></i>正确
                        </button>
                        <button class="btn btn-danger btn-action" onclick="markWrong()">
                            <i class="bi bi-x-circle me-2"></i>错误
                        </button>
                    </div>

                    <!-- 完成提示 -->
                    <div class="text-center mt-4" id="completeArea" style="display: none;">
                        <div class="alert alert-success fs-4" role="alert">
                            <i class="bi bi-trophy-fill me-2"></i>恭喜完成听写！
                        </div>
                        <div class="row mt-3">
                            <div class="col-6">
                                <div class="stat-card">
                                    <div class="stat-number text-success" id="correctCount">0</div>
                                    <div class="stat-label">正确数</div>
                                </div>
                            </div>
                            <div class="col-6">
                                <div class="stat-card">
                                    <div class="stat-number text-danger" id="wrongCount">0</div>
                                    <div class="stat-label">错误数</div>
                                </div>
                            </div>
                        </div>
                        <!-- 完成任务按钮 -->
                        <button class="btn btn-success btn-action mt-3" id="completeTaskBtn" style="display: none;" onclick="completeTask()">
                            <i class="bi bi-check-circle-fill me-2"></i>标记任务已完成
                        </button>
                        <button class="btn btn-primary btn-action mt-3" onclick="reviewWrong()">
                            <i class="bi bi-arrow-repeat me-2"></i>复习错误词语
                        </button>
                        <button class="btn btn-secondary btn-action mt-3" onclick="location.reload()">
                            <i class="bi bi-plus-circle me-2"></i>开始新的听写
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 错误词语列表 -->
    <div class="row" id="wrongWordsSection" style="display: none;">
        <div class="col-12">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <i class="bi bi-exclamation-triangle me-2"></i>错误词语（已自动加入生词本）
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover">
                            <thead>
                                <tr>
                                    <th>词语</th>
                                    <th>错误次数</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="wrongWordsList">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 页脚 -->
<footer th:replace="~{layout :: footer}"></footer>

<!-- 脚本 -->
<div th:replace="~{layout :: scripts}"></div>

<script>
    // 全局变量
    let words = [];
    let currentIndex = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let wrongWords = [];
    let isDictating = false;
    let batchId = null;
    let selectedTaskId = null;

    // 语音合成
    const synth = window.speechSynthesis;
    let currentUtterance = null;

    // 开始听写
    function startDictation() {
        if (!selectedTaskId) {
            showToast('请先选择一个已保存的听写任务！', 'warning');
            return;
        }

        const input = document.getElementById('wordInput').value.trim();
        if (!input) {
            showToast('任务词语为空！', 'warning');
            return;
        }

        // 解析词语
        words = input.split('\n')
            .map(w => w.trim())
            .filter(w => w.length > 0);

        if (words.length === 0) {
            showToast('任务词语无效！', 'warning');
            return;
        }

        // 重置状态
        currentIndex = 0;
        correctCount = 0;
        wrongCount = 0;
        wrongWords = [];
        isDictating = true;

        // 更新统计
        updateStats();

        // 显示听写区域
        document.getElementById('progressContainer').style.display = 'block';
        document.getElementById('statusArea').style.display = 'block';
        document.getElementById('controlButtons').style.display = 'flex';
        document.getElementById('answerArea').style.display = 'block';
        document.getElementById('resultButtons').style.display = 'flex';
        document.getElementById('completeArea').style.display = 'none';
        document.getElementById('wrongWordsSection').style.display = 'none';
        document.getElementById('startBtn').disabled = true;

        // 开始第一个词语
        showCurrentWord();

        // 通过API开始听写（更新任务状态为进行中）
        startDictationFromTask(selectedTaskId);
    }

    // 从任务开始听写（调用API）
    async function startDictationFromTask(taskId) {
        try {
            const response = await fetch(`/api/tasks/${taskId}/dictation`, {
                method: 'POST'
            });
            const result = await response.json();
            if (result.success) {
                batchId = result.data;
            } else {
                showToast(result.message || '启动失败', 'warning');
            }
        } catch (error) {
            console.error('启动听写失败:', error);
        }
    }

    // 更新统计信息
    function updateStats() {
        const completed = correctCount + wrongCount;
        document.getElementById('totalCount').textContent = words.length;
        document.getElementById('completedCount').textContent = completed;
        document.getElementById('remainingCount').textContent = words.length - completed;
        document.getElementById('totalWords').textContent = words.length;

        // 更新进度条
        const progress = words.length > 0 ? (completed / words.length * 100) : 0;
        const progressBar = document.getElementById('progressBar');
        progressBar.style.width = progress + '%';
        progressBar.textContent = Math.round(progress) + '%';
    }

    // 显示当前词语
    function showCurrentWord() {
        if (currentIndex >= words.length) {
            finishDictation();
            return;
        }

        document.getElementById('currentIndex').textContent = currentIndex + 1;
        document.getElementById('wordDisplay').innerHTML = '<i class="bi bi-volume-up-fill text-primary" style="font-size: 3rem;"></i>';
        document.getElementById('answerText').style.display = 'none';
        document.getElementById('correctWord').textContent = '';

        // 检查是否是最后一个词语，改变"下一个"按钮
        const nextBtn = document.getElementById('nextBtn');
        if (currentIndex === words.length - 1) {
            nextBtn.innerHTML = '<i class="bi bi-check-circle-fill me-2"></i>完成听写';
            nextBtn.className = 'btn btn-success btn-action';
            nextBtn.onclick = finishDictation;
        } else {
            nextBtn.innerHTML = '<i class="bi bi-arrow-right-circle me-2"></i>下一个';
            nextBtn.className = 'btn btn-info btn-action';
            nextBtn.onclick = nextWord;
        }

        // 自动朗读
        readWord(words[currentIndex]);
    }

    // 朗读词语
    function readWord(word) {
        if (synth.speaking) {
            synth.cancel();
        }
        currentUtterance = new SpeechSynthesisUtterance(word);
        currentUtterance.lang = 'zh-CN';
        currentUtterance.rate = 0.8;
        currentUtterance.pitch = 1;
        synth.speak(currentUtterance);
    }

    // 再次朗读
    function readAgain() {
        if (currentIndex < words.length) {
            readWord(words[currentIndex]);
        }
    }

    // 上一个词语
    function previousWord() {
        if (currentIndex > 0) {
            currentIndex--;
            updateStats();
            showCurrentWord();
        }
    }

    // 下一个词语
    function nextWord() {
        if (currentIndex < words.length - 1) {
            currentIndex++;
            updateStats();
            showCurrentWord();
        }
    }

    // 显示答案
    function showAnswer() {
        const word = words[currentIndex];
        document.getElementById('correctWord').textContent = word;
        document.getElementById('answerText').style.display = 'block';
    }

    // 标记正确
    function markCorrect() {
        correctCount++;
        currentIndex++;

        if (currentIndex >= words.length) {
            finishDictation();
        } else {
            updateStats();
            showCurrentWord();
        }
    }

    // 标记错误
    function markWrong() {
        const word = words[currentIndex];
        wrongCount++;

        // 添加到错误列表
        const existingWord = wrongWords.find(w => w.word === word);
        if (existingWord) {
            existingWord.count++;
        } else {
            wrongWords.push({ word: word, count: 1 });
        }

        currentIndex++;

        if (currentIndex >= words.length) {
            finishDictation();
        } else {
            updateStats();
            showCurrentWord();
        }
    }

    // 完成听写
    function finishDictation() {
        isDictating = false;

        // 设置进度条为100%
        const progressBar = document.getElementById('progressBar');
        progressBar.style.width = '100%';
        progressBar.textContent = '100%';

        // 更新剩余数为0
        document.getElementById('remainingCount').textContent = '0';
        document.getElementById('completedCount').textContent = correctCount + wrongCount;

        // 显示完成区域
        document.getElementById('controlButtons').style.display = 'none';
        document.getElementById('answerArea').style.display = 'none';
        document.getElementById('resultButtons').style.display = 'none';
        document.getElementById('completeArea').style.display = 'block';
        document.getElementById('correctCount').textContent = correctCount;
        document.getElementById('wrongCount').textContent = wrongCount;
        document.getElementById('wordDisplay').innerHTML = '<i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>';

        // 如果是从已保存任务开始的，显示"完成任务"按钮
        if (selectedTaskId) {
            document.getElementById('completeTaskBtn').style.display = 'inline-block';
        }

        // 显示错误词语
        if (wrongWords.length > 0) {
            document.getElementById('wrongWordsSection').style.display = 'block';
            const tbody = document.getElementById('wrongWordsList');
            tbody.innerHTML = '';
            wrongWords.forEach(w => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${w.word}</strong></td>
                        <td><span class="badge bg-danger">${w.count}</span></td>
                        <td>
                            <button class="btn btn-sm btn-outline-primary" onclick="readWord('${w.word}')">
                                <i class="bi bi-volume-up"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });

            // 保存错误词语到生词本
            saveWrongWords();
        }

        // 更新批次状态
        updateBatchStatus();
    }

    // 标记任务已完成
    async function completeTask() {
        if (!selectedTaskId) {
            showToast('没有选择任务', 'warning');
            return;
        }

        try {
            const response = await fetch(`/api/tasks/${selectedTaskId}/complete`, {
                method: 'POST'
            });

            const result = await response.json();

            if (result.success) {
                showToast('任务已标记为完成！', 'success');
                // 隐藏按钮
                document.getElementById('completeTaskBtn').style.display = 'none';
            } else {
                showToast(result.message || '操作失败', 'warning');
            }
        } catch (error) {
            console.error('完成任务失败:', error);
            showToast('操作失败，请检查网络', 'warning');
        }
    }

    // 复习错误词语
    function reviewWrong() {
        if (wrongWords.length === 0) {
            showToast('没有需要复习的词语！', 'info');
            return;
        }

        // 用错误词语重新开始听写
        words = wrongWords.map(w => w.word);
        wrongWords = [];
        currentIndex = 0;
        correctCount = 0;
        wrongCount = 0;

        document.getElementById('completeArea').style.display = 'none';
        document.getElementById('wrongWordsSection').style.display = 'none';
        document.getElementById('controlButtons').style.display = 'flex';
        document.getElementById('answerArea').style.display = 'block';
        document.getElementById('resultButtons').style.display = 'flex';

        updateStats();
        showCurrentWord();
    }

    // 清空重来
    function clearAll() {
        document.getElementById('wordInput').value = '';
        document.getElementById('batchName').value = '';
        document.getElementById('progressContainer').style.display = 'none';
        document.getElementById('statusArea').style.display = 'none';
        document.getElementById('controlButtons').style.display = 'none';
        document.getElementById('answerArea').style.display = 'none';
        document.getElementById('resultButtons').style.display = 'none';
        document.getElementById('completeArea').style.display = 'none';
        document.getElementById('wrongWordsSection').style.display = 'none';
        document.getElementById('startBtn').disabled = false;
        document.getElementById('wordDisplay').innerHTML = '<span class="text-muted">请先录入词语并点击"开始听写"</span>';
        document.getElementById('totalCount').textContent = '0';
        document.getElementById('completedCount').textContent = '0';
        document.getElementById('remainingCount').textContent = '0';

        words = [];
        currentIndex = 0;
        correctCount = 0;
        wrongCount = 0;
        wrongWords = [];
        isDictating = false;
    }

    // 保存批次到后端
    async function saveBatch() {
        const batchName = document.getElementById('batchName').value || `听写_${new Date().toLocaleDateString()}`;
        try {
            const response = await fetch('/api/batches', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: batchName,
                    wordCount: words.length,
                    words: words
                })
            });
            if (response.ok) {
                const data = await response.json();
                batchId = data.id;
            }
        } catch (error) {
            console.error('保存批次失败:', error);
        }
    }

    // 更新批次状态
    async function updateBatchStatus() {
        if (!batchId) return;
        try {
            await fetch(`/api/batches/${batchId}/complete`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    correctCount: correctCount,
                    wrongCount: wrongCount
                })
            });
        } catch (error) {
            console.error('更新批次状态失败:', error);
        }
    }

    // 保存错误词语到生词本
    async function saveWrongWords() {
        try {
            await fetch('/api/difficult-words/batch', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(wrongWords.map(w => ({
                    word: w.word,
                    masteryLevel: 1
                })))
            });
        } catch (error) {
            console.error('保存生词失败:', error);
        }
    }

    // 显示提示
    function showToast(message, type = 'info') {
        const toastHtml = `
            <div class="toast align-items-center text-white bg-${type === 'warning' ? 'warning' : 'primary'} border-0" role="alert">
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            </div>
        `;
        const container = document.createElement('div');
        container.className = 'toast-container position-fixed top-0 end-0 p-3';
        container.innerHTML = toastHtml;
        document.body.appendChild(container);
        const toast = new bootstrap.Toast(container.querySelector('.toast'));
        toast.show();
        setTimeout(() => container.remove(), 5000);
    }

    // 页面加载完成
    document.addEventListener('DOMContentLoaded', function() {
        // 加载听写任务列表
        refreshTasks();
    });

    // 刷新听写任务列表（只加载未完成的任务）
    async function refreshTasks() {
        try {
            const response = await fetch('/api/tasks/uncompleted');
            const result = await response.json();

            if (result.success && result.data) {
                const select = document.getElementById('taskSelect');
                select.innerHTML = '<option value="">-- 请选择听写任务 --</option>';

                result.data.forEach(task => {
                    const option = document.createElement('option');
                    option.value = task.id;
                    const statusText = task.status === 'IN_PROGRESS' ? '【进行中】' : '【未开始】';
                    option.textContent = `${statusText} ${task.taskName} (${task.wordCount}个词)`;
                    select.appendChild(option);
                });
            }
        } catch (error) {
            console.error('加载听写任务失败:', error);
        }
    }

    // 加载选中的听写任务
    async function loadTask() {
        const taskId = document.getElementById('taskSelect').value;
        if (!taskId) {
            // 清除选中状态
            selectedTaskId = null;
            document.getElementById('selectedTaskWords').style.display = 'none';
            document.getElementById('selectedTaskName').style.display = 'none';
            document.getElementById('startDictationSection').style.display = 'none';
            return;
        }

        selectedTaskId = taskId;

        try {
            const response = await fetch(`/api/tasks/${taskId}`);
            const result = await response.json();

            if (result.success && result.data) {
                const task = result.data;
                document.getElementById('wordInput').value = task.words.join('\n');
                document.getElementById('batchName').value = task.taskName;

                // 显示任务详情区域
                document.getElementById('selectedTaskWords').style.display = 'block';
                document.getElementById('selectedTaskName').style.display = 'block';
                document.getElementById('startDictationSection').style.display = 'grid';

                // 根据状态更新显示
                const statusBadge = task.status === 'IN_PROGRESS' ? '（进行中）' : '（未开始）';
                showToast(`已加载：${task.taskName} ${statusBadge}`, 'success');
            } else {
                showToast('加载任务失败', 'warning');
                selectedTaskId = null;
            }
        } catch (error) {
            console.error('加载听写任务失败:', error);
            showToast('加载失败，请检查网络', 'warning');
            selectedTaskId = null;
        }
    }
</script>
</body>
</html>
