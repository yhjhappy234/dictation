<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>听写小助手 - 登录</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary-color: #FF6B6B;
            --secondary-color: #4ECDC4;
            --accent-color: #FFE66D;
            --bg-color: #FFF5F5;
            --text-color: #2C3E50;
        }

        * {
            font-family: 'Microsoft YaHei', 'PingFang SC', sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--bg-color) 0%, #FFF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
        }

        .login-container {
            max-width: 400px;
            width: 100%;
            padding: 20px;
        }

        .login-card {
            background: white;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
            padding: 40px;
            transition: all 0.3s ease;
        }

        .login-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 25px 70px rgba(0,0,0,0.2);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 4rem;
            color: var(--primary-color);
        }

        .logo-title {
            font-size: 2rem;
            font-weight: bold;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo-subtitle {
            color: #888;
            font-size: 1rem;
        }

        .form-floating {
            margin-bottom: 20px;
        }

        .form-control {
            border-radius: 15px;
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid #E0E0E0;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 0.3rem rgba(78,205,196,0.25);
        }

        .btn-login {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            border: none;
            border-radius: 25px;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            color: white;
            width: 100%;
            box-shadow: 0 4px 15px rgba(255,107,107,0.4);
            transition: all 0.3s ease;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 25px rgba(255,107,107,0.5);
        }

        .btn-login:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .error-message {
            background: #fff3cd;
            border: 1px solid #ffc107;
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 20px;
            color: #856404;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .loading-spinner {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .loading-spinner.show {
            display: block;
        }

        @media (max-width: 576px) {
            .login-card {
                padding: 30px 20px;
            }

            .logo-icon {
                font-size: 3rem;
            }

            .logo-title {
                font-size: 1.5rem;
            }

            .form-control {
                padding: 12px 15px;
                font-size: 1rem;
            }

            .btn-login {
                padding: 12px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-card">
        <!-- Logo 区域 -->
        <div class="logo-area">
            <i class="bi bi-book-half logo-icon"></i>
            <h1 class="logo-title">听写小助手</h1>
            <p class="logo-subtitle">让学习更有趣</p>
        </div>

        <!-- 错误提示 -->
        <div class="error-message" id="errorMessage">
            <i class="bi bi-exclamation-triangle-fill me-2"></i>
            <span id="errorText">登录失败，请检查用户名和密码</span>
        </div>

        <!-- 登录表单 -->
        <form id="loginForm" onsubmit="handleLogin(event)">
            <div class="form-floating">
                <input type="text" class="form-control" id="username" name="username" placeholder="用户名" required>
                <label for="username"><i class="bi bi-person me-1"></i>用户名</label>
            </div>

            <div class="form-floating">
                <input type="password" class="form-control" id="password" name="password" placeholder="密码" required>
                <label for="password"><i class="bi bi-lock me-1"></i>密码</label>
            </div>

            <button type="submit" class="btn btn-login" id="loginBtn">
                <i class="bi bi-box-arrow-in-right me-2"></i>登录
            </button>
        </form>

        <!-- 加载状态 -->
        <div class="loading-spinner" id="loadingSpinner">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">登录中...</span>
            </div>
            <p class="mt-2 text-muted">正在登录...</p>
        </div>
    </div>
</div>

<!-- Bootstrap 5 JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // 登录处理
    async function handleLogin(event) {
        event.preventDefault();

        // 获取表单数据
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
            showError('请输入用户名和密码');
            return;
        }

        // 显示加载状态
        showLoading(true);
        hideError();

        try {
            // 发送登录请求
            const response = await fetch('/api/v1/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                credentials: 'include',
                body: JSON.stringify({
                    username: username,
                    password: password
                })
            });

            const result = await response.json();

            if (result.success) {
                // 登录成功，跳转到首页
                window.location.href = '/';
            } else {
                // 登录失败，显示错误
                showError(result.message || '登录失败，请检查用户名和密码');
            }
        } catch (error) {
            console.error('登录请求失败:', error);
            showError('网络错误，请稍后重试');
        } finally {
            showLoading(false);
        }
    }

    // 显示错误
    function showError(message) {
        const errorDiv = document.getElementById('errorMessage');
        const errorText = document.getElementById('errorText');
        errorText.textContent = message;
        errorDiv.classList.add('show');
    }

    // 隐藏错误
    function hideError() {
        const errorDiv = document.getElementById('errorMessage');
        errorDiv.classList.remove('show');
    }

    // 显示/隐藏加载状态
    function showLoading(show) {
        const spinner = document.getElementById('loadingSpinner');
        const loginBtn = document.getElementById('loginBtn');
        const form = document.getElementById('loginForm');

        if (show) {
            spinner.classList.add('show');
            loginBtn.disabled = true;
            form.style.opacity = '0.7';
        } else {
            spinner.classList.remove('show');
            loginBtn.disabled = false;
            form.style.opacity = '1';
        }
    }

    // 页面加载时检查登录状态
    document.addEventListener('DOMContentLoaded', async function() {
        try {
            const response = await fetch('/api/v1/auth/status', { credentials: 'include' });
            const result = await response.json();
            if (result.success && result.data === true) {
                // 已登录，直接跳转到首页
                window.location.href = '/';
            }
        } catch (error) {
            console.error('检查登录状态失败:', error);
        }
    });
</script>
</body>
</html>
