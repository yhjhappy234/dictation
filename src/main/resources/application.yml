
server:
  port: 8080
  servlet:
    session:
      timeout: 2h

spring:
  application:
    name: dictation

  datasource:
    url: jdbc:sqlite:src/main/resources/dictation.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  # Flyway Database Migration
  flyway:
    enabled: true
    baseline-on-migrate: false
    locations: classpath:db/migration

  threads:
    virtual:
      enabled: true

  main:
    lazy-initialization: true

  # 时区配置 - 默认东八区
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

# 日志配置（生产环境级别）
logging:
  level:
    root: WARN
    com.yhj.dictation: INFO
    org.hibernate: WARN
    org.springframework: WARN

# 跨域配置
cors:
  allowed-origins: "*"
  allowed-methods: "*"
  allowed-headers: "*"
  allow-credentials: true

# 默认用户配置（通过环境变量设置，不在此文件中暴露）
# 设置环境变量：APP_DEFAULT_USERNAME 和 APP_DEFAULT_PASSWORD
app:
  default:
    username: ${APP_DEFAULT_USERNAME:admin}
    password: ${APP_DEFAULT_PASSWORD:123456}