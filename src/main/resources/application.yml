server:
  port: 8080

spring:
  application:
    name: dictation

  datasource:
    url: jdbc:sqlite:src/main/resources/dictation.db
    driver-class-name: org.sqlite.JDBC

  jpa:
    database-platform: org.hibernate.community.dialect.SQLiteDialect
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  threads:
    virtual:
      enabled: true

  main:
    lazy-initialization: true

# 日志配置（生产环境级别）
logging:
  level:
    root: WARN
    com.yhj.dictation: INFO
    org.hibernate: WARN
    org.springframework: WARN

# 跨域配置
cors:
  allowed-origins: "*"
  allowed-methods: "*"
  allowed-headers: "*"
  allow-credentials: true